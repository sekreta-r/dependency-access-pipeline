      echo "Downloaded $SIZE bytes"

      if curl -fsSL \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --output kvrt-bin/kvrt.run.sha256 \
          "$SHA_URL" 2>/dev/null; then

        EXPECTED_SHA=$(awk '{print $1}' kvrt-bin/kvrt.run.sha256)
        ACTUAL_SHA=$(sha256sum kvrt-bin/kvrt.run | awk '{print $1}')

        echo "Expected SHA256: $EXPECTED_SHA"
        echo "Actual SHA256:   $ACTUAL_SHA"

        if [ "$EXPECTED_SHA" != "$ACTUAL_SHA" ]; then
          echo "FATAL: SHA256 mismatch — registry corruption?"
          exit 1
        fi

        echo "✓ SHA256 verified"
      else
        echo "WARNING: kvrt.run.sha256 not found in registry, skipping integrity check"
      fi

      chmod +x kvrt-bin/kvrt.run
      ls -la kvrt-bin/

    - |
      echo "=== Recording KVRT binary identity ==="
      {
        echo "binary: kvrt.run"
        echo "sha256: $(sha256sum kvrt-bin/kvrt.run | awk '{print $1}')"
        echo "size_bytes: $(stat -c%s kvrt-bin/kvrt.run)"
        echo "registry_url: $REGISTRY_URL"
      } > artifacts/kvrt-engine-version.txt

      cat artifacts/kvrt-engine-version.txt

    - |
      echo "=== Running KVRT scan ==="
      set +e

      ./kvrt-bin/kvrt.run -- \
        -accepteula \
        -silent \
        -dontencrypt \
        -customonly \
        -custom "$(pwd)/scan-target" \
        > artifacts/kvrt-output.txt 2>&1

      KVRT_EXIT=$?
      set -e

      echo "KVRT exit code: $KVRT_EXIT"
      echo "----- KVRT output (tail -50) -----"
      tail -n 50 artifacts/kvrt-output.txt || true

    - |
      echo "=== Collecting KVRT reports ==="

      KVRT_DATA_DIR=""
      REPORT_FOUND="false"

      for dir in \
        /var/opt/KVRT2024_Data \
        /root/KVRT2024_Data \
        "$PWD/KVRT2024_Data" \
        "$PWD/kvrt-data/KVRT2024_Data"
      do
        if [ -d "$dir" ]; then
          KVRT_DATA_DIR="$dir"
          break
        fi
      done

      if [ -n "$KVRT_DATA_DIR" ]; then
        echo "KVRT data dir: $KVRT_DATA_DIR"
        ls -la "$KVRT_DATA_DIR" || true

        if [ -d "$KVRT_DATA_DIR/Reports" ]; then
          mkdir -p artifacts/kvrt-reports
          cp -r "$KVRT_DATA_DIR/Reports/." artifacts/kvrt-reports/ || true
          REPORT_FOUND="true"

          echo "Reports collected:"
          ls -la artifacts/kvrt-reports/ || true
        fi

        if [ -d "$KVRT_DATA_DIR/Quarantine" ]; then
          ls -la "$KVRT_DATA_DIR/Quarantine/" > artifacts/kvrt-quarantine-list.txt 2>/dev/null || true
        fi
      else
        echo "WARNING: KVRT2024_Data directory not found"
      fi

    - |
      SCAN_FINISHED_MARKER="false"
      if [ -f artifacts/kvrt-output.txt ] && \
         grep -qE "Scan (is )?finished" artifacts/kvrt-output.txt; then
        SCAN_FINISHED_MARKER="true"
      fi

      FATAL_ERROR_MARKER="false"
      if [ -f artifacts/kvrt-output.txt ] && \
         grep -qiE "(scan (failed|error)|cannot (open|read|access)|fatal error)" \
              artifacts/kvrt-output.txt; then
        FATAL_ERROR_MARKER="true"
      fi

      DETECTED_FROM_STDOUT=0
      if [ -f artifacts/kvrt-output.txt ]; then
        DETECTED_FROM_STDOUT=$(grep -oiE "Detected: *[0-9]+|threats? detected" \
          artifacts/kvrt-output.txt | grep -oE "[0-9]+" | head -1)
        DETECTED_FROM_STDOUT=${DETECTED_FROM_STDOUT:-0}
      fi

      DETECTED_FROM_XML=0
      if [ -d artifacts/kvrt-reports ]; then
        DETECTED_FROM_XML=$(find artifacts/kvrt-reports -name "*.xml" -exec \
          grep -hcE '(detected="true"|<ThreatInfo>|<Threat>)' {} + 2>/dev/null \
          | awk '{s+=$1} END {print s+0}')
      fi

      DETECTED_COUNT=$(echo "$DETECTED_FROM_STDOUT $DETECTED_FROM_XML" \
        | awk '{print ($1>$2)?$1:$2}')

      {
        echo "KVRT_POST_EXIT_CODE=${KVRT_EXIT}"
        echo "KVRT_POST_DETECTED_COUNT=${DETECTED_COUNT}"
        echo "KVRT_POST_DETECTED_FROM_STDOUT=${DETECTED_FROM_STDOUT}"
        echo "KVRT_POST_DETECTED_FROM_XML=${DETECTED_FROM_XML}"
        echo "KVRT_POST_SCAN_FINISHED_MARKER=${SCAN_FINISHED_MARKER}"
        echo "KVRT_POST_FATAL_ERROR_MARKER=${FATAL_ERROR_MARKER}"
        echo "KVRT_POST_REPORT_FOUND=${REPORT_FOUND}"
        echo "KVRT_POST_IMAGE_FOUND=${IMAGE_FOUND}"
        echo "KVRT_POST_IMAGE_EXPORTED=${IMAGE_EXPORTED}"
      } > artifacts/kvrt_post.env

      echo "===== emitted kvrt_post.env ====="
      cat artifacts/kvrt_post.env

    - rm -f ~/.docker/config.json

  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - artifacts/kvrt-output.txt
      - artifacts/kvrt-reports/
      - artifacts/kvrt-quarantine-list.txt
      - artifacts/kvrt-engine-version.txt
      - artifacts/crane-errors.txt
      - artifacts/kvrt_post.env

  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^ci\/bump-/'
      when: on_success
    - when: never

grype_image:
  stage: image_security
  
  needs:
    - job: build_image
      artifacts: true
    - job: grype_sbom
      artifacts: true

  image: alpine:3.20

  before_script:   
    - set -euo pipefail
    - apk add --no-cache ca-certificates curl jq yq bash coreutils
    - cp "$GITLAB_CA_CERT" /usr/local/share/ca-certificates/gitlab.example.com.crt
    - |
      if [ -n "${REGISTRY_CA_CERT:-}" ] && [ -f "$REGISTRY_CA_CERT" ]; then
        cp "$REGISTRY_CA_CERT" /usr/local/share/ca-certificates/registry.example.com.crt
      fi
    - update-ca-certificates
    - curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | bash -s -- -b /usr/local/bin
    - grype version
    - yq --version
    - jq --version
    
  script:
    - mkdir -p artifacts

    - |
      REST="${CI_COMMIT_REF_NAME#ci/bump-}"
      VERSION="${REST##*-}"
      RUNTIME="${REST%-${VERSION}}"
      echo "RUNTIME=$RUNTIME"
      echo "VERSION=$VERSION"

    - |
      POLICY="security/grype-scope.yaml"
      if [ ! -f "$POLICY" ]; then
        echo "ERROR: policy file $POLICY not found"
        exit 1
      fi
      echo "=== Active grype-scope policy ==="
      cat "$POLICY"
      cp "$POLICY" artifacts/grype-scope.yaml

    - |
      IMAGE_FOUND="false"
      if [ -n "${BUILT_IMAGE:-}" ]; then
        IMAGE="${BUILT_IMAGE}"
        IMAGE_FOUND="true"
        echo "Target image: $IMAGE"
        echo "Image tag:    ${BUILT_IMAGE_TAG:-unknown}"
        echo "Built from wheel: ${BUILT_FROM_WHEEL:-unknown}"
        echo "Built from SHA:   ${BUILT_FROM_WHEEL_SHA256:-unknown}"
      else
        echo "WARNING: BUILT_IMAGE not set — build_image did not provide image identity"
        IMAGE=""
      fi

    - |
      echo "=== Configuring registry credentials ==="
      mkdir -p ~/.docker
      AUTH=$(printf '%s:%s' "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')
      cat > ~/.docker/config.json <<EOF
      {
        "auths": {
          "${CI_REGISTRY}": {
            "auth": "${AUTH}"
          }
        }
      }
      EOF
      chmod 600 ~/.docker/config.json
      echo "Configured docker auth for $CI_REGISTRY"

    
    - |
      echo "=== Updating Grype vulnerability database ==="
      set +e
      grype db update 2>&1 | tee artifacts/grype-image-db-update.txt
      DB_UPDATE_EXIT=$?
      set -e
      echo "grype db update exit code: $DB_UPDATE_EXIT"

      grype db status > artifacts/grype-image-db-status.txt 2>&1 || true
      echo "=== Grype DB status ==="
      cat artifacts/grype-image-db-status.txt

  
    - |
      echo "=== CISA KEV catalog ==="
      KEV_URL="https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json"

      KEV_FETCH_OK="false"
      KEV_REUSED="false"

      if [ -f artifacts/cisa-kev.json ] && [ -s artifacts/cisa-kev.json ]; then
        if jq empty artifacts/cisa-kev.json >/dev/null 2>&1; then
          KEV_REUSED="true"
          KEV_FETCH_OK="true"
          KEV_CVE_COUNT=$(jq '.vulnerabilities | length' artifacts/cisa-kev.json 2>/dev/null || echo "0")
          echo "Reusing CISA KEV from grype_sbom: $KEV_CVE_COUNT CVEs"
        else
          echo "WARNING: reused KEV file is invalid JSON, re-fetching"
          rm -f artifacts/cisa-kev.json
        fi
      fi

      if [ "$KEV_REUSED" = "false" ]; then
        if curl -fsSL -o artifacts/cisa-kev.json "$KEV_URL"; then
          KEV_FETCH_OK="true"
          KEV_CVE_COUNT=$(jq '.vulnerabilities | length' artifacts/cisa-kev.json 2>/dev/null || echo "0")
          echo "Fetched KEV catalog: $KEV_CVE_COUNT CVEs"
        else
          echo "WARNING: failed to fetch CISA KEV catalog"
          echo '{"vulnerabilities":[]}' > artifacts/cisa-kev.json
          KEV_CVE_COUNT=0
        fi
      fi

    
    - |
      echo "=== Recording engine and database versions ==="
      {
        echo "grype_engine: $(grype version 2>&1 | grep -E '^Application:|^Version:' | head -2 | tr '\n' ' ')"
        echo "grype_db_status: $(grep -oE 'Built:[^|]*' artifacts/grype-image-db-status.txt 2>/dev/null || echo 'unknown')"
        echo "cisa_kev_cve_count: $KEV_CVE_COUNT"
        echo "cisa_kev_reused: $KEV_REUSED"
        echo "cisa_kev_url: $KEV_URL"
        echo "target_image: ${IMAGE:-unknown}"
        echo "target_image_tag: ${BUILT_IMAGE_TAG:-unknown}"
        echo "built_from_wheel: ${BUILT_FROM_WHEEL:-unknown}"
        echo "built_from_wheel_sha256: ${BUILT_FROM_WHEEL_SHA256:-unknown}"
      } > artifacts/grype-image-engine-version.txt
      cat artifacts/grype-image-engine-version.txt


    - |
      echo "=== Running Grype scan on container image ==="

      if [ "$IMAGE_FOUND" = "true" ] && [ "$DB_UPDATE_EXIT" -eq 0 ]; then
        set +e
        grype "registry:${IMAGE}" \
          --output json \
          --file artifacts/grype-image-report.json \
          2> artifacts/grype-image-errors.txt
        GRYPE_EXIT=$?
        set -e
        echo "grype exit code: $GRYPE_EXIT"
      else
        echo "Skipping grype scan: IMAGE_FOUND=$IMAGE_FOUND, DB_UPDATE_EXIT=$DB_UPDATE_EXIT"
        echo '{"matches":[]}' > artifacts/grype-image-report.json
        GRYPE_EXIT=127
      fi

      if [ -s artifacts/grype-image-errors.txt ]; then
        echo "=== Grype stderr (tail -20) ==="
        tail -n 20 artifacts/grype-image-errors.txt
      fi

    - |
      REPORT="artifacts/grype-image-report.json"

      JSON_PARSE_ERROR="false"
      if [ ! -s "$REPORT" ] || ! jq empty "$REPORT" >/dev/null 2>&1; then
        JSON_PARSE_ERROR="true"
        echo '{"matches":[]}' > "$REPORT"
      fi

      count_severity() {
        local sev=$1
        jq --arg sev "$sev" '[.matches[]?
          | select(.vulnerability.severity == $sev)]
          | length' "$REPORT"
      }

      count_severity_fixed() {
        local sev=$1
        jq --arg sev "$sev" '[.matches[]?
          | select(.vulnerability.severity == $sev
                   and .vulnerability.fix.state == "fixed")]
          | length' "$REPORT"
      }

      CRITICAL_TOTAL=$(count_severity "Critical")
      CRITICAL_FIXED=$(count_severity_fixed "Critical")
      CRITICAL_UNFIXED=$((CRITICAL_TOTAL - CRITICAL_FIXED))

      HIGH_TOTAL=$(count_severity "High")
      HIGH_FIXED=$(count_severity_fixed "High")
      HIGH_UNFIXED=$((HIGH_TOTAL - HIGH_FIXED))

      MEDIUM_TOTAL=$(count_severity "Medium")
      LOW_TOTAL=$(count_severity "Low")
      NEGLIGIBLE_TOTAL=$(count_severity "Negligible")

      TOTAL_MATCHES=$(jq '[.matches[]?] | length' "$REPORT")

      KEV_MATCHES=0
      if [ -s artifacts/cisa-kev.json ]; then
        KEV_MATCHES=$(jq --slurpfile kev artifacts/cisa-kev.json \
          '[.matches[]?
            | .vulnerability.id as $cve
            | select($kev[0].vulnerabilities[]?.cveID == $cve)]
          | length' "$REPORT")
      fi

      echo "Counts: Critical=$CRITICAL_TOTAL (fixed=$CRITICAL_FIXED), High=$HIGH_TOTAL (fixed=$HIGH_FIXED), KEV=$KEV_MATCHES"

    
    - |
      GRYPE_SCAN_ERROR="false"
      if [ "$DB_UPDATE_EXIT" -ne 0 ] || [ "$GRYPE_EXIT" -gt 1 ] || [ "$JSON_PARSE_ERROR" = "true" ]; then
        GRYPE_SCAN_ERROR="true"
      fi

      {
        echo "GRYPE_IMAGE_TARGET=image"
        echo "GRYPE_IMAGE_IMAGE_FOUND=${IMAGE_FOUND}"
        echo "GRYPE_IMAGE_DB_UPDATE_EXIT=${DB_UPDATE_EXIT}"
        echo "GRYPE_IMAGE_KEV_FETCH_OK=${KEV_FETCH_OK}"
        echo "GRYPE_IMAGE_KEV_REUSED=${KEV_REUSED}"
        echo "GRYPE_IMAGE_EXIT_CODE=${GRYPE_EXIT}"
        echo "GRYPE_IMAGE_JSON_PARSE_ERROR=${JSON_PARSE_ERROR}"
        echo "GRYPE_IMAGE_SCAN_ERROR=${GRYPE_SCAN_ERROR}"

        echo "GRYPE_IMAGE_CRITICAL_TOTAL=${CRITICAL_TOTAL}"
        echo "GRYPE_IMAGE_CRITICAL_FIXED=${CRITICAL_FIXED}"
        echo "GRYPE_IMAGE_CRITICAL_UNFIXED=${CRITICAL_UNFIXED}"
        echo "GRYPE_IMAGE_HIGH_TOTAL=${HIGH_TOTAL}"
        echo "GRYPE_IMAGE_HIGH_FIXED=${HIGH_FIXED}"
        echo "GRYPE_IMAGE_HIGH_UNFIXED=${HIGH_UNFIXED}"
        echo "GRYPE_IMAGE_MEDIUM_TOTAL=${MEDIUM_TOTAL}"
        echo "GRYPE_IMAGE_LOW_TOTAL=${LOW_TOTAL}"
        echo "GRYPE_IMAGE_NEGLIGIBLE_TOTAL=${NEGLIGIBLE_TOTAL}"
        echo "GRYPE_IMAGE_TOTAL_MATCHES=${TOTAL_MATCHES}"

        echo "GRYPE_IMAGE_KEV_MATCHES=${KEV_MATCHES}"
      } > artifacts/grype-image.env

      echo "===== emitted grype-image.env ====="
      cat artifacts/grype-image.env

   
    - rm -f ~/.docker/config.json

  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - artifacts/grype-image-report.json
      - artifacts/grype-image-errors.txt
      - artifacts/grype-image-db-update.txt
      - artifacts/grype-image-db-status.txt
      - artifacts/grype-image-engine-version.txt
      - artifacts/grype-scope.yaml
      - artifacts/cisa-kev.json
      - artifacts/grype-image.env

  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^ci\/bump-/'
      when: on_success
    - when: never

deploy_to_test_k8s:
  stage: deploy
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  needs:
  - job: build_image
    artifacts: true
  before_script:
    - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig.yaml
    - export KUBECONFIG=/tmp/kubeconfig.yaml
  script:
    - IMAGE="${BUILT_IMAGE}"
    - echo "Deploying image $IMAGE"

    - kubectl apply -f k8s/namespace.yaml

    - |
      kubectl create secret docker-registry registry-credentials \
        --docker-server="${CI_REGISTRY}" \
        --docker-username="${CI_REGISTRY_USER}" \
        --docker-password="${CI_REGISTRY_PASSWORD}" \
        --namespace=mlserver-test \
        --dry-run=client -o yaml | kubectl apply -f -


    - sed -i "s|MLSERVER_IMAGE_PLACEHOLDER|${IMAGE}|g" k8s/deployment.yaml
    - kubectl apply -f k8s/service.yaml
    - kubectl apply -f k8s/deployment.yaml
    - kubectl rollout status deployment/mlserver -n mlserver-test --timeout=180s

    - |
      kubectl run smoke-check \
        --image=curlimages/curl:latest \
        --restart=Never \
        --namespace=mlserver-test \
        --rm \
        --attach \
        -- curl -sf http://mlserver.mlserver-test.svc.cluster.local:8080/v2/health/ready
    - echo "DEPLOY_OK=true" > deploy.env
    - echo "MLSERVER_ENDPOINT=http://mlserver.mlserver-test.svc.cluster.local:8080" >> deploy.env

  after_script:
    - if [ ! -f deploy.env ] || ! grep -q '^DEPLOY_OK=true' deploy.env; then
        echo "DEPLOY_OK=false" > deploy.env
      fi

  artifacts:
    reports:
      dotenv: deploy.env
    paths:
      - deploy.env
    when: always
    expire_in: 1 day

  rules:
    - if: '$CI_COMMIT_BRANCH != "master"'

zap_scan:
  stage: post_deploy_security
  needs:
    - job: deploy_to_test_k8s
      artifacts: true

  image:
    name: ghcr.io/zaproxy/zaproxy:stable
    entrypoint: [""]

  variables:
    GIT_SUBMODULE_STRATEGY: none

  before_script:
    - set -euo pipefail

    - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    - chmod +x kubectl
    - export PATH="${PWD}:${PATH}"

    - apt-get update -qq && apt-get install -y --no-install-recommends jq curl ca-certificates
    - cp "$GITLAB_CA_CERT" /usr/local/share/ca-certificates/gitlab.example.com.crt 2>/dev/null || true
    - update-ca-certificates 2>/dev/null || true

    - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig.yaml
    - export KUBECONFIG=/tmp/kubeconfig.yaml

    - kubectl version --client=true
    - jq --version
    - zap.sh -version 2>&1 | head -3 || true

  script:
    - mkdir -p artifacts

    - |
      REST="${CI_COMMIT_REF_NAME#ci/bump-}"
      VERSION="${REST##*-}"
      RUNTIME="${REST%-${VERSION}}"
      echo "RUNTIME=$RUNTIME"
      echo "VERSION=$VERSION"

    - |
      POLICY="security/zap-scope.yaml"
      if [ ! -f "$POLICY" ]; then
        echo "ERROR: policy file $POLICY not found"
        exit 1
      fi
      echo "=== Active zap-scope policy ==="
      cat "$POLICY"
      cp "$POLICY" artifacts/zap-scope.yaml

    - |
      ZAP_DEPLOY_OK="false"
      if [ "${DEPLOY_OK:-false}" = "true" ]; then
        ZAP_DEPLOY_OK="true"
        echo "Deploy OK; endpoint: ${MLSERVER_ENDPOINT:-unknown}"
      else
        echo "WARNING: DEPLOY_OK is not true — scan will likely fail"
      fi

    - |
      echo "=== Recording ZAP engine version ==="
      {
        echo "zap_engine: $(zap.sh -version 2>&1 | head -1 || echo 'unknown')"
        echo "kubectl_version: $(kubectl version --client=true 2>/dev/null | head -1 || echo 'unknown')"
        echo "image_used: ghcr.io/zaproxy/zaproxy:stable"
      } > artifacts/zap-engine-version.txt
      cat artifacts/zap-engine-version.txt

    - |
      echo "=== Setting up port-forward ==="
      kubectl port-forward svc/mlserver 8080:8080 -n mlserver-test &
      PF_PID=$!
      echo "port-forward PID: $PF_PID"
      sleep 5

      ZAP_ENDPOINT_READY="false"
      if curl -sf --max-time 10 http://localhost:8080/v2/health/ready > /dev/null; then
        ZAP_ENDPOINT_READY="true"
        echo "Endpoint /v2/health/ready: OK"
      else
        echo "WARNING: endpoint /v2/health/ready is not responding"
      fi

    - |
      echo "=== Fetching OpenAPI spec ==="
      ZAP_OPENAPI_FETCHED="false"
      OPENAPI_URL="http://localhost:8080/v2/docs/dataplane.json"

      if curl -fsSL --max-time 10 -o artifacts/dataplane.json "$OPENAPI_URL"; then
        if jq empty artifacts/dataplane.json 2>/dev/null; then
          ZAP_OPENAPI_FETCHED="true"
          OPENAPI_SIZE=$(stat -c%s artifacts/dataplane.json)
          echo "Fetched OpenAPI spec: $OPENAPI_SIZE bytes"
        else
          echo "WARNING: OpenAPI spec downloaded but not valid JSON"
        fi
      else
        echo "WARNING: failed to fetch OpenAPI spec from $OPENAPI_URL"
      fi

    - |
      echo "=== Running ZAP API Scan ==="
      mkdir -p /zap/wrk
      set +e

      if [ "$ZAP_OPENAPI_FETCHED" = "true" ]; then
        zap-api-scan.py \
          -t "$OPENAPI_URL" \
          -f openapi \
          -r /zap/wrk/zap-report.html \
          -J /zap/wrk/zap-report.json \
          -d \
          > artifacts/zap-output.txt 2> artifacts/zap-errors.txt
        ZAP_EXIT=$?
      else
        echo "Skipping ZAP scan: OpenAPI spec not available"
        echo '{"site":[]}' > /zap/wrk/zap-report.json
        ZAP_EXIT=127
      fi
      set -e

      echo "ZAP exit code: $ZAP_EXIT"

      cp /zap/wrk/zap-report.json artifacts/zap-report.json 2>/dev/null || \
        echo '{"site":[]}' > artifacts/zap-report.json
      cp /zap/wrk/zap-report.html artifacts/zap-report.html 2>/dev/null || true

      if [ -s artifacts/zap-errors.txt ]; then
        echo "=== ZAP stderr (tail -20) ==="
        tail -n 20 artifacts/zap-errors.txt
      fi

    - |
      REPORT="artifacts/zap-report.json"

      JSON_PARSE_ERROR="false"
      if [ ! -s "$REPORT" ] || ! jq empty "$REPORT" >/dev/null 2>&1; then
        JSON_PARSE_ERROR="true"
        echo '{"site":[]}' > "$REPORT"
      fi

      count_by_risk() {
        local risk=$1
        jq --arg risk "$risk" '[.site[]?.alerts[]?
          | select(.riskcode == $risk)] | length' "$REPORT"
      }

      count_by_risk_conf() {
        local risk=$1
        local conf_min=$2
        jq --arg risk "$risk" --arg cmin "$conf_min" '[.site[]?.alerts[]?
          | select(.riskcode == $risk and (.confidence | tonumber) >= ($cmin | tonumber))]
          | length' "$REPORT"
      }

      HIGH_RISK_TOTAL=$(count_by_risk "3")
      HIGH_RISK_HIGH_CONF=$(count_by_risk_conf "3" "3")
      MEDIUM_RISK_TOTAL=$(count_by_risk "2")
      MEDIUM_RISK_HIGH_CONF=$(count_by_risk_conf "2" "3")
      LOW_RISK_TOTAL=$(count_by_risk "1")
      INFO_RISK_TOTAL=$(count_by_risk "0")

      TOTAL_ALERTS=$(jq '[.site[]?.alerts[]?] | length' "$REPORT")

      ALERT_NAMES=$(jq -r '[.site[]?.alerts[]?.name] | unique | join(",")' "$REPORT" \
        2>/dev/null || echo "")

      echo "Risk counts: High=$HIGH_RISK_TOTAL (HC=$HIGH_RISK_HIGH_CONF), Medium=$MEDIUM_RISK_TOTAL, Low=$LOW_RISK_TOTAL, Info=$INFO_RISK_TOTAL"

    - |
      ZAP_SCAN_ERROR="false"
      if [ "$ZAP_DEPLOY_OK" = "false" ] \
         || [ "$ZAP_ENDPOINT_READY" = "false" ] \
         || [ "$ZAP_OPENAPI_FETCHED" = "false" ] \
         || [ "$JSON_PARSE_ERROR" = "true" ] \
         || [ "$ZAP_EXIT" -ge 3 ]; then
        ZAP_SCAN_ERROR="true"
      fi

      {
        echo "ZAP_DEPLOY_OK=${ZAP_DEPLOY_OK}"
        echo "ZAP_ENDPOINT_READY=${ZAP_ENDPOINT_READY}"
        echo "ZAP_OPENAPI_FETCHED=${ZAP_OPENAPI_FETCHED}"
        echo "ZAP_EXIT_CODE=${ZAP_EXIT}"
        echo "ZAP_JSON_PARSE_ERROR=${JSON_PARSE_ERROR}"
        echo "ZAP_SCAN_ERROR=${ZAP_SCAN_ERROR}"

        echo "ZAP_HIGH_RISK_TOTAL=${HIGH_RISK_TOTAL}"
        echo "ZAP_HIGH_RISK_HIGH_CONF=${HIGH_RISK_HIGH_CONF}"
        echo "ZAP_MEDIUM_RISK_TOTAL=${MEDIUM_RISK_TOTAL}"
        echo "ZAP_MEDIUM_RISK_HIGH_CONF=${MEDIUM_RISK_HIGH_CONF}"
        echo "ZAP_LOW_RISK_TOTAL=${LOW_RISK_TOTAL}"
        echo "ZAP_INFO_RISK_TOTAL=${INFO_RISK_TOTAL}"
        echo "ZAP_TOTAL_ALERTS=${TOTAL_ALERTS}"
      } > artifacts/zap.env

      echo "===== emitted zap.env ====="
      cat artifacts/zap.env

    - |
      if kill -0 "$PF_PID" 2>/dev/null; then
        kill "$PF_PID" 2>/dev/null || true
        echo "port-forward terminated"
      fi

  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - artifacts/zap-report.json
      - artifacts/zap-report.html
      - artifacts/zap-output.txt
      - artifacts/zap-errors.txt
      - artifacts/zap-engine-version.txt
      - artifacts/zap-scope.yaml
      - artifacts/dataplane.json
      - artifacts/zap.env

  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^ci\/bump-/'
      when: on_success
    - when: never

schemathesis_fuzz:
  stage: post_deploy_security
  needs:
    - job: deploy_to_test_k8s
      artifacts: true

  image: python:3.11-slim

  variables:
    GIT_SUBMODULE_STRATEGY: none

  before_script:
    - set -euo pipefail

    - apt-get update -qq
    - apt-get install -y --no-install-recommends curl wget ca-certificates jq xmlstarlet
    - rm -rf /var/lib/apt/lists/*
    - cp "$GITLAB_CA_CERT" /usr/local/share/ca-certificates/gitlab.example.com.crt 2>/dev/null || true
    - update-ca-certificates 2>/dev/null || true

    - curl -fsSL -o /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
    - chmod +x /usr/local/bin/yq

    - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/

    - pip install --quiet --no-cache-dir 'schemathesis<4'

    - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig.yaml
    - export KUBECONFIG=/tmp/kubeconfig.yaml

    - kubectl version --client=true
    - jq --version
    - yq --version
    - xmlstarlet --version 2>&1 | head -1 || true
    - schemathesis --version

  script:
    - mkdir -p artifacts

    - |
      REST="${CI_COMMIT_REF_NAME#ci/bump-}"
      VERSION="${REST##*-}"
      RUNTIME="${REST%-${VERSION}}"
      echo "RUNTIME=$RUNTIME"
      echo "VERSION=$VERSION"

    - |
      POLICY="security/schemathesis-scope.yaml"
      if [ ! -f "$POLICY" ]; then
        echo "ERROR: policy file $POLICY not found"
        exit 1
      fi
      echo "=== Active schemathesis-scope policy ==="
      cat "$POLICY"
      cp "$POLICY" artifacts/schemathesis-scope.yaml

    - |
      MAX_EXAMPLES=$(yq -r '.schemathesis.scan_options.max_examples' security/schemathesis-scope.yaml)
      CHECKS=$(yq -r '.schemathesis.scan_options.checks' security/schemathesis-scope.yaml)
      OPENAPI_PATH=$(yq -r '.schemathesis.target.openapi_path' security/schemathesis-scope.yaml)
      HEALTH_PATH=$(yq -r '.schemathesis.target.health_path' security/schemathesis-scope.yaml)
      echo "max_examples: $MAX_EXAMPLES"
      echo "checks:       $CHECKS"
      echo "openapi_path: $OPENAPI_PATH"
      echo "health_path:  $HEALTH_PATH"

    - |
      SCHEMATHESIS_DEPLOY_OK="false"
      if [ "${DEPLOY_OK:-false}" = "true" ]; then
        SCHEMATHESIS_DEPLOY_OK="true"
        echo "Deploy OK; endpoint: ${MLSERVER_ENDPOINT:-unknown}"
      else
        echo "WARNING: DEPLOY_OK is not true — scan will likely fail"
      fi

    - |
      echo "=== Recording Schemathesis engine version ==="
      {
        echo "schemathesis_engine: $(schemathesis --version 2>&1 | head -1)"
        echo "python_version: $(python3 --version)"
        echo "kubectl_version: $(kubectl version --client=true 2>/dev/null | head -1 || echo 'unknown')"
        echo "max_examples: $MAX_EXAMPLES"
        echo "checks: $CHECKS"
      } > artifacts/schemathesis-engine-version.txt
      cat artifacts/schemathesis-engine-version.txt

    - |
      echo "=== Setting up port-forward ==="
      kubectl port-forward svc/mlserver 8080:8080 -n mlserver-test &
      PF_PID=$!
      echo "port-forward PID: $PF_PID"
      sleep 5

      SCHEMATHESIS_ENDPOINT_READY="false"
      if curl -sf --max-time 10 "http://localhost:8080${HEALTH_PATH}" > /dev/null; then
        SCHEMATHESIS_ENDPOINT_READY="true"
        echo "Endpoint ${HEALTH_PATH}: OK"
      else
        echo "WARNING: endpoint ${HEALTH_PATH} is not responding"
      fi

    - |
      echo "=== Fetching OpenAPI spec ==="
      SCHEMATHESIS_OPENAPI_FETCHED="false"
      OPENAPI_URL="http://localhost:8080${OPENAPI_PATH}"

      if curl -fsSL --max-time 10 -o artifacts/dataplane.json "$OPENAPI_URL"; then
        if jq empty artifacts/dataplane.json 2>/dev/null; then
          SCHEMATHESIS_OPENAPI_FETCHED="true"
          OPENAPI_SIZE=$(stat -c%s artifacts/dataplane.json)
          echo "Fetched OpenAPI spec: $OPENAPI_SIZE bytes"
        else
          echo "WARNING: OpenAPI spec downloaded but not valid JSON"
        fi
      else
        echo "WARNING: failed to fetch OpenAPI spec from $OPENAPI_URL"
      fi

    - |
      echo "=== Running Schemathesis fuzz ==="
      set +e

      if [ "$SCHEMATHESIS_OPENAPI_FETCHED" = "true" ]; then
        schemathesis run "$OPENAPI_URL" \
          --checks "$CHECKS" \
          --hypothesis-max-examples="$MAX_EXAMPLES" \
          --hypothesis-suppress-health-check=filter_too_much \
          --junit-xml=artifacts/schemathesis-junit.xml \
          > artifacts/schemathesis-output.txt 2> artifacts/schemathesis-errors.txt
        SCHEMATHESIS_EXIT=$?
      else
        echo "Skipping Schemathesis run: OpenAPI spec not available"
        echo '<?xml version="1.0"?><testsuites/>' > artifacts/schemathesis-junit.xml
        SCHEMATHESIS_EXIT=127
      fi
      set -e

      echo "Schemathesis exit code: $SCHEMATHESIS_EXIT"
      echo "----- Schemathesis output (tail -50) -----"
      tail -n 50 artifacts/schemathesis-output.txt 2>/dev/null || true

      if [ -s artifacts/schemathesis-errors.txt ]; then
        echo "----- Schemathesis stderr (tail -20) -----"
        tail -n 20 artifacts/schemathesis-errors.txt
      fi

    - |
      JUNIT="artifacts/schemathesis-junit.xml"
      XML_PARSE_ERROR="false"

      TOTAL_CHECKS=0
      FAILED_CHECKS=0
      ERRORS=0

      if [ -s "$JUNIT" ] && xmlstarlet val -e "$JUNIT" >/dev/null 2>&1; then
        TOTAL_CHECKS=$(xmlstarlet sel -t -v 'sum(//testsuite/@tests)' "$JUNIT" 2>/dev/null || echo "0")
        FAILED_CHECKS=$(xmlstarlet sel -t -v 'sum(//testsuite/@failures)' "$JUNIT" 2>/dev/null || echo "0")
        ERRORS=$(xmlstarlet sel -t -v 'sum(//testsuite/@errors)' "$JUNIT" 2>/dev/null || echo "0")

        TOTAL_CHECKS=${TOTAL_CHECKS:-0}
        FAILED_CHECKS=${FAILED_CHECKS:-0}
        ERRORS=${ERRORS:-0}
      else
        XML_PARSE_ERROR="true"
        echo "WARNING: schemathesis JUnit XML is missing or invalid"
      fi

      HAS_5XX_COUNT=0
      SCHEMA_VIOLATIONS=0

      if [ -s artifacts/schemathesis-output.txt ]; then
        HAS_5XX_COUNT=$(grep -cE '\[5[0-9]{2}\]|status_code: 5[0-9]{2}|HTTP 5[0-9]{2}' \
          artifacts/schemathesis-output.txt 2>/dev/null || echo "0")
        HAS_5XX_COUNT=$(echo "$HAS_5XX_COUNT" | tr -d '[:space:]')
        HAS_5XX_COUNT=${HAS_5XX_COUNT:-0}

        SCHEMA_VIOLATIONS=$(grep -cE 'response_schema_conformance|SchemaError' \
          artifacts/schemathesis-output.txt 2>/dev/null || echo "0")
        SCHEMA_VIOLATIONS=$(echo "$SCHEMA_VIOLATIONS" | tr -d '[:space:]')
        SCHEMA_VIOLATIONS=${SCHEMA_VIOLATIONS:-0}
      fi

      HAS_5XX="false"
      [ "$HAS_5XX_COUNT" -gt 0 ] && HAS_5XX="true"

      echo "Total=$TOTAL_CHECKS, Failed=$FAILED_CHECKS, Errors=$ERRORS, 5xx=$HAS_5XX_COUNT, SchemaViol=$SCHEMA_VIOLATIONS"

    - |
      SCHEMATHESIS_SCAN_ERROR="false"
      if [ "$SCHEMATHESIS_DEPLOY_OK" = "false" ] \
         || [ "$SCHEMATHESIS_ENDPOINT_READY" = "false" ] \
         || [ "$SCHEMATHESIS_OPENAPI_FETCHED" = "false" ] \
         || [ "$XML_PARSE_ERROR" = "true" ] \
         || [ "$SCHEMATHESIS_EXIT" -ge 2 ]; then
        SCHEMATHESIS_SCAN_ERROR="true"
      fi

      {
        echo "SCHEMATHESIS_DEPLOY_OK=${SCHEMATHESIS_DEPLOY_OK}"
        echo "SCHEMATHESIS_ENDPOINT_READY=${SCHEMATHESIS_ENDPOINT_READY}"
        echo "SCHEMATHESIS_OPENAPI_FETCHED=${SCHEMATHESIS_OPENAPI_FETCHED}"
        echo "SCHEMATHESIS_EXIT_CODE=${SCHEMATHESIS_EXIT}"
        echo "SCHEMATHESIS_XML_PARSE_ERROR=${XML_PARSE_ERROR}"
        echo "SCHEMATHESIS_SCAN_ERROR=${SCHEMATHESIS_SCAN_ERROR}"
        echo "SCHEMATHESIS_MAX_EXAMPLES=${MAX_EXAMPLES}"
        echo "SCHEMATHESIS_CHECKS=${CHECKS}"

        echo "SCHEMATHESIS_TOTAL_CHECKS=${TOTAL_CHECKS}"
        echo "SCHEMATHESIS_FAILED_CHECKS=${FAILED_CHECKS}"
        echo "SCHEMATHESIS_ERRORS=${ERRORS}"

        echo "SCHEMATHESIS_HAS_5XX=${HAS_5XX}"
        echo "SCHEMATHESIS_HAS_5XX_COUNT=${HAS_5XX_COUNT}"
        echo "SCHEMATHESIS_SCHEMA_VIOLATIONS=${SCHEMA_VIOLATIONS}"
      } > artifacts/schemathesis.env

      echo "===== emitted schemathesis.env ====="
      cat artifacts/schemathesis.env

    - |
      if kill -0 "$PF_PID" 2>/dev/null; then
        kill "$PF_PID" 2>/dev/null || true
        echo "port-forward terminated"
      fi

  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - artifacts/schemathesis-output.txt
      - artifacts/schemathesis-errors.txt
      - artifacts/schemathesis-junit.xml
      - artifacts/schemathesis-engine-version.txt
      - artifacts/schemathesis-scope.yaml
      - artifacts/dataplane.json
      - artifacts/schemathesis.env

  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^ci\/bump-/'
      when: on_success
    - when: never

normalize_reports:
  stage: normalization
  image: python:3.11-slim

  variables:
    GIT_SUBMODULE_STRATEGY: none
    NORMALIZE_INPUT_DIR: "normalized-input"
    NORMALIZE_OUTPUT: "artifacts/normalized.json"

  needs:
    - job: av_scan_pre_clamav
      artifacts: true
    - job: av_scan_pre_kvrt
      artifacts: true
    - job: bandit_and_sbom
      artifacts: true
    - job: yara_scan
      artifacts: true
    - job: grype_sbom
      artifacts: true
    - job: av_scan_post_clamav
      artifacts: true
    - job: av_scan_post_kvrt
      artifacts: true
    - job: grype_image
      artifacts: true
    - job: zap_scan
      artifacts: true
      optional: true
    - job: schemathesis_fuzz
      artifacts: true
      optional: true

  before_script:
    - set -euo pipefail
    - python3 --version

  script:
    - mkdir -p "$NORMALIZE_INPUT_DIR" artifacts

    - |
      collect() {
        local src="$1"
        if [ -f "$src" ]; then
          cp "$src" "$NORMALIZE_INPUT_DIR/"
          echo "  collected: $src"
        else
          echo "  MISSING:   $src (tool artifact absent -> ⊥)"
        fi
      }

      echo "=== Collecting raw tool artifacts ==="
      collect artifacts/clamav_pre.env
      collect artifacts/clamav_post.env
      collect artifacts/kvrt_pre.env
      collect artifacts/kvrt_post.env
      collect artifacts/yara.env
      collect artifacts/bandit.env
      collect artifacts/grype-sbom.env
      collect artifacts/grype-image.env
      collect artifacts/zap.env
      collect artifacts/schemathesis.env

      echo ""
      echo "=== Collected input directory ==="
      ls -la "$NORMALIZE_INPUT_DIR/"

    - |
      echo "=== Running Level-1 normalization ==="
      python3 normalize.py "$NORMALIZE_INPUT_DIR" "$NORMALIZE_OUTPUT"

    - |
      echo "=== Validating normalized.json ==="
      python3 - "$NORMALIZE_OUTPUT" <<'PY'
      import json, sys
      path = sys.argv[1]
      with open(path, encoding="utf-8") as f:
          data = json.load(f)
      assert data.get("schema_version") == "1.0", "bad schema_version"
      assert set(data.get("sigma", {})) == {"T003", "T004", "T005"}, "sigma incomplete"
      tools = data.get("tools", {})
      expected = {"clamav","kvrt","yara","ripgrep","bandit","grype","zap","schemathesis"}
      assert expected <= set(tools), f"tools missing: {expected - set(tools)}"
      print("OK: schema_version, sigma, tools present")
      PY

      echo ""
      echo "===== normalized.json ====="
      cat "$NORMALIZE_OUTPUT"

  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - artifacts/normalized.json
      - normalized-input/

  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^ci\/bump-/'
      when: on_success
    - when: never

automaton_verdict:
  stage: decision
  image: python:3.11-slim

  variables:
    GIT_SUBMODULE_STRATEGY: none
    NORMALIZED_INPUT: "artifacts/normalized.json"
    VERDICT_OUTPUT: "artifacts/verdict.json"
    KII_CATEGORY: "3"

  needs:
    - job: normalize_reports
      artifacts: true
    - job: fetch_artifact
      artifacts: true

  before_script:
    - set -euo pipefail
    - python3 --version

  script:
    - mkdir -p artifacts

    - |
      echo "=== Checking automaton inputs ==="
      if [ ! -f "$NORMALIZED_INPUT" ]; then
        echo "FATAL: $NORMALIZED_INPUT not found (normalize stage failed?)"
        exit 1
      fi
      echo "  normalized.json: present"

    - |
      echo "=== Deriving supply_verified ==="
      SUPPLY_VERIFIED="${SUPPLY_VERIFIED:-false}"
      echo "  WHEEL_FOUND=${WHEEL_FOUND:-<unset>}"
      echo "  FETCH_SCAN_ERROR=${FETCH_SCAN_ERROR:-<unset>}"
      echo "  -> supply_verified=$SUPPLY_VERIFIED"

    - |
      echo "=== Running EFSM automaton (Levels 2-3) ==="
      OVERRIDES="--kii_category=$KII_CATEGORY --supply_verified=$SUPPLY_VERIFIED"
      if [ -n "${EXPERT_VERDICT:-}" ]; then
        OVERRIDES="$OVERRIDES --expert_verdict=$EXPERT_VERDICT"
        echo "  expert_verdict (повторный прогон): $EXPERT_VERDICT"
      else
        echo "  expert_verdict не задан — первый прогон (⊥)"
      fi

      python3 automaton.py "$NORMALIZED_INPUT" /nonexistent-context.json \
        "$VERDICT_OUTPUT" $OVERRIDES

    - |
      echo ""
      echo "===== verdict.json ====="
      cat "$VERDICT_OUTPUT"
      echo ""

      VERDICT=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1]))['verdict'])" "$VERDICT_OUTPUT")
      FINAL_STATE=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1]))['final_state'])" "$VERDICT_OUTPUT")
      echo "=== Final verdict: $VERDICT (state $FINAL_STATE) ==="

    - |
      case "$VERDICT" in
        ALLOW)
          echo "Обновление допускается. Job зелёная, мерж разрешён."
          ;;
        MANUAL_REVIEW)
          echo "Требуется экспертиза T006 (тест(ы) в статусе YELLOW)."
          echo "Эксперт: изучите verdict.json (conflict_log, conflict_sources),"
          echo "затем перезапустите эту job (retry) с переменной EXPERT_VERDICT:"
          echo "  NDV_REFUTED          — подозрение снято, YELLOW->GREEN"
          echo "  NDV_NON_DESTRUCTIVE  — НДВ без деструктива, остаётся MANUAL_REVIEW"
          echo "  NDV_DESTRUCTIVE      — НДВ подтверждены, итог REJECT"
          echo "  T006_IMPOSSIBLE      — анализ невозможен, итог REJECT"
          exit 1
          ;;
        REJECT)
          echo "Обновление НЕ допускается (вето / отсутствие отчёта / НДВ)."
          echo "Перезапуск с EXPERT_VERDICT результат не изменит:"
          echo "автомат не доходит до экспертного шага T006."
          exit 1
          ;;
        *)
          echo "FATAL: неизвестный вердикт '$VERDICT'"
          exit 1
          ;;
      esac

  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - artifacts/verdict.json

  rules:
  - if: '$CI_COMMIT_BRANCH =~ /^ci\/bump-/'
    when: manual
    allow_failure: false
  - when: never
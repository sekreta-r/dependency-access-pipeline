# ====================================================================
# Политика поиска опасных конструкций (тест Т004) для пайплайна
# тестирования обновлений безопасности по Методике ФСТЭК 2022 г.
# ====================================================================
#
# Назначение
#   Зафиксировать состав, границы и правила нормализации результатов
#   поиска опасных конструкций в обновлениях безопасности средствами
#   YARA и ripgrep в рамках теста Т004 (п. 3.5 Методики).
#
#   Политика регламентирует Уровень 1 формальной модели — переход
#   от сырых признаков, эмитируемых job-ой yara_scan, к статусам
#   двух независимых инструментов в множестве {PASS, REVIEW, FAIL,
#   MISSING} (см. таблица Г.1 диплома). Агрегация статусов с парным
#   инструментом (Bandit) и определение цвета теста Т004 выполняются
#   на Уровне 2 по отдельной политике, не входящей в настоящий файл.
#
# Контекст по Методике
#   Согласно п. 3.5.2 Методики, поиск опасных конструкций в обновлениях
#   безопасности предусматривает:
#     а) поиск опасных конструкций с применением индикаторов
#        компрометации, YARA-правил и других способов;
#     б) контекстный поиск политических баннеров, лозунгов и другой
#        противоправной информации в обновлениях безопасности.
#
#   Подпункт (а) закрывается средством YARA с применением набора правил
#   YARA-Forge — агрегатора правил из публичных репозиториев threat
#   intelligence, прошедших автоматический контроль качества через
#   yaraQA. Подпункт (б) закрывается средством ripgrep по перечню
#   паттернов, определяемому оператором информационной системы.
#
#   YARA и ripgrep в формальной модели рассматриваются как два
#   независимых инструмента теста Т004 (вместе с Bandit — три
#   инструмента, см. строки для T004 в таблице Г.1 диплома).
# ====================================================================

# ====================================================================
# Инструмент 1: YARA — поиск опасных конструкций с применением IoC
# (п. 3.5.2(а) Методики)
# ====================================================================
yara:
  # ── Метаданные движка ─────────────────────────────────────────────
  engine:
    source: "apt:yara"
    version_pin: "Debian Trixie default (4.5.x)"
    rationale: >-
      YARA — стандартное средство сопоставления с правилами threat
      intelligence. Версия движка фиксируется в каждом прогоне
      в артефакте yara-engine-version.txt для воспроизводимости
      (п. 4.3 Методики). Конкретная версия определяется базовым
      Debian-репозиторием образа python:3.11-slim и не пиннится здесь,
      чтобы не дублировать source-of-truth.

  # ── Источник правил ───────────────────────────────────────────────
  # Релизы YARA-Forge публикуются еженедельно в GitHub Releases.
  # Версия зафиксирована для воспроизводимости. Обновление версии —
  # отдельным пайплайном по расписанию, через pull request.
  ruleset:
    source: "YARA-Forge"
    package: "core"
    version: "20260503"
    url: "https://github.com/YARAHQ/yara-forge/releases/download/20260503/yara-forge-rules-core.zip"
    archive_member: "packages/core/yara-rules-core.yar"
    rationale: >-
      Используется набор Core, оптимизированный по соотношению
      точности и производительности (минимизация ложных срабатываний).
      Наборы Extended и Full включают правила с более высоким уровнем
      ложных срабатываний и не подходят для автоматического принятия
      решения в CI-пайплайне.
    score_tiers:
      high_threshold: 75
      med_threshold:  50
      rationale_thresholds: >-
        Пороги score 75/50 соответствуют конвенции YARA-Forge,
        зафиксированной в meta-блоке правил. Job эмитирует счётчики
        совпадений по этим тиерам как сырые признаки. Пороги
        изменению в политике прототипа не подлежат; для альтернативной
        интерпретации требуется отдельный набор правил (Extended/Full).

  # ── Объекты сканирования ──────────────────────────────────────────
  targets:
    - name: "update_source"
      path: "scan-target/repo"
      description: >-
        Исходный Python-код обновления безопасности — директория
        runtimes/${RUNTIME}/, на которую указывает submodule,
        обновляемый в текущем пайплайне. Соответствует п. 3.5.1
        Методики в части "файл(ы) обновления безопасности
        в распакованном виде".
    - name: "update_artifact"
      path: "scan-target/wheel"
      description: >-
        Распакованный wheel-архив обновляемого пакета, загруженный
        непосредственно из PyPI и верифицированный по контрольной
        сумме в fetch_artifact (тест Т001). Объект включает как
        Python-исходники (.py), так и скомпилированные расширения
        (.so, .pyd) — бинарные артефакты, в которых могут располагаться
        опасные конструкции, не обнаруживаемые при анализе только
        исходного кода (характерно для атак типа XZ Utils backdoor,
        CVE-2024-3094).

  # ── Нормализация результатов YARA (Уровень 1, таблица Г.1) ────────
  # Сырые признаки, эмитируемые job-ой:
  #   YARA_MAX_SCORE              — максимальный score среди всех совпадений
  #   YARA_MATCH_COUNT            — общее число совпадений
  #   YARA_HIGH_SCORE_COUNT       — число совпадений с score >= 75
  #   YARA_MED_SCORE_COUNT        — число совпадений со score 50..74
  #   YARA_LOW_SCORE_COUNT        — число совпадений со score < 50
  #   YARA_REPO_EXIT_CODE         — exit code yara для repo target
  #   YARA_WHEEL_EXIT_CODE        — exit code yara для wheel target
  #   YARA_WHEEL_FOUND            — был ли найден wheel-артефакт
  #   YARA_REPO_SOURCE_FOUND      — был ли найден исходный код
  #   YARA_SCAN_ERROR             — сводный флаг технической ошибки
  #
  # Правила применяются в порядке приоритета.
  normalization:
    # 1. Отсутствие входных артефактов → недостаток данных
    - status: "MISSING"
      when:
        all:
          - "YARA_WHEEL_FOUND == false"
          - "YARA_REPO_SOURCE_FOUND == false"
      rationale: >-
        Ни один объект сканирования не сформирован. Инструмент
        не может вынести заключение. Согласно примечанию к таблице Г.1
        диплома, фиксируется как ⊥ (MISSING) и переводит автомат EFSM
        в состояние q₇ через δ1.1.

    # 2. Техническая ошибка сканирования → недостаток данных
    - status: "MISSING"
      when:
        any:
          - "YARA_SCAN_ERROR == true"
      rationale: >-
        Сводный флаг YARA_SCAN_ERROR=true фиксирует, что exit code
        одного из прогонов yara сигнализировал об ошибке компиляции
        правил, I/O или иной технической проблеме, либо что
        yara-raw.txt пуст (катастрофический сбой). У yara exit code
        0 — это штатное завершение (с совпадениями или без), ненулевой
        exit означает ошибку, а не отсутствие совпадений. В обоих
        случаях валидный отчёт отсутствует, статус — ⊥.
        Соответствует определению ⊥ из примечания Г.1 диплома.

    # 3. Совпадение с правилом высокой опасности → FAIL
    - status: "FAIL"
      when:
        all:
          - "YARA_HIGH_SCORE_COUNT > 0"
      rationale: >-
        Совпадение хотя бы с одним правилом YARA-Forge со score >= 75
        интерпретируется как достоверное обнаружение опасной
        конструкции. YARA-Forge оптимизирует Core-набор по точности,
        что обосновывает квалификацию HIGH-совпадения как FAIL без
        требования экспертной верификации на Уровне 1. Это отличает
        YARA от антивирусов (ClamAV, KVRT), у которых статус FAIL
        на Уровне 1 не выставляется (см. примечание к таблице Г.1).

    # 4. Совпадение средней опасности → REVIEW
    - status: "REVIEW"
      when:
        all:
          - "YARA_MED_SCORE_COUNT > 0"
          - "YARA_HIGH_SCORE_COUNT == 0"
      rationale: >-
        Совпадение со score 50..74 — недостаточно для FAIL, но требует
        экспертной верификации. Соответствует строке REVIEW для YARA
        в таблице Г.1 диплома.

    # 5. Иначе — чистый прогон
    - status: "PASS"
      when:
        all:
          - "YARA_SCAN_ERROR == false"
          - "YARA_HIGH_SCORE_COUNT == 0"
          - "YARA_MED_SCORE_COUNT == 0"
      rationale: >-
        Сканирование штатно завершилось, отсутствуют совпадения
        со score >= 50. Совпадения LOW score не учитываются
        на Уровне 1 в соответствии с таблицей Г.1 диплома; они
        сохраняются в полном yara-raw.txt и доступны для экспертного
        анализа (Т006), но не блокируют автоматическое принятие
        решения.

# ====================================================================
# Инструмент 2: ripgrep — контекстный поиск противоправной информации
# (п. 3.5.2(б) Методики)
# ====================================================================
ripgrep:
  # ── Метаданные движка ─────────────────────────────────────────────
  engine:
    source: "apt:ripgrep"
    version_pin: "Debian Trixie default (14.x)"
    rationale: >-
      ripgrep выбран как высокопроизводительная утилита поиска
      по регулярным выражениям с поддержкой Unicode и параллельного
      обхода файловой системы. Версия фиксируется в артефакте
      yara-engine-version.txt вместе с движком yara.

  description: >-
    Подпункт (б) п. 3.5.2 Методики предусматривает контекстный поиск
    "политических баннеров, лозунгов и другой противоправной
    информации". Перечень паттернов для такого поиска не публикуется
    в открытых источниках threat intelligence (в отличие от YARA-
    правил supply-chain атак, агрегируемых проектом YARA-Forge),
    поскольку определение "противоправной информации" зависит от
    законодательства юрисдикции и политики безопасности конкретного
    оператора информационной системы.

    В рамках прототипа перечень паттернов выносится в раздел
    pattern_categories этой политики и должен быть наполнен оператором
    информационной системы в соответствии с его внутренней политикой
    безопасности и применимым законодательством. В прототипе перечень
    оставлен пустым, что эмпирически проявляется в эмиссии
    RG_TOTAL_MATCHES=0 при штатной работе job и в статусе MISSING
    после нормализации.

  # ── Категории паттернов поиска ────────────────────────────────────
  # Каждая категория имеет свой severity (FAIL/REVIEW), что позволяет
  # дифференцированно реагировать на разные классы противоправной
  # информации. Перечень заполняется оператором ИС.
  #
  # Severity категории НЕ интерпретируется job-ой yara_scan — job
  # эмитирует только фактические счётчики RG_MATCH_<CAT_VAR>. Связь
  # счётчиков со severity делается на Уровне 1 нормализатором
  # в normalize_reports, который читает этот файл и сопоставляет
  # ID категории с её severity.
  pattern_categories:
    - id: "user_defined"
      description: >-
        Раздел для определения перечня паттернов противоправной
        информации оператором информационной системы. Наполнение
        раздела является ответственностью оператора и не входит
        в объём прототипа. При непустом перечне любое совпадение
        квалифицируется как REVIEW.
      severity: "REVIEW"
      patterns: []

  # ── Технические опции ripgrep ─────────────────────────────────────
  options:
    case_sensitive: false
    excluded_globs:
      - ".git"
      - "*.lock"
      - "artifacts"
      - "yara-rules"
      - "node_modules"

  # ── Нормализация результатов ripgrep (Уровень 1, таблица Г.1) ────
  # Сырые признаки, эмитируемые job-ой:
  #   RG_TOTAL_MATCHES            — общее число совпадений
  #   RG_CATEGORIES_MATCHED       — список ID сработавших категорий
  #                                  (через запятую, "none" если пусто)
  #   RG_HAS_NONEMPTY_CATEGORIES  — была ли хотя бы одна категория
  #                                  с непустым перечнем паттернов
  #   RG_MATCH_<CAT_ID_UPPER>     — счётчик совпадений по категории
  #                                  (по одной переменной на каждую
  #                                   категорию из pattern_categories)
  #
  # Особенность нормализации: severity совпадения определяется
  # severity категории, в которой оно произошло. Правила опираются
  # на предикат "existsFailCategory(matches)" — существует ли в
  # pattern_categories категория с severity=FAIL такая, что её
  # счётчик RG_MATCH_<CAT_ID_UPPER> > 0. Этот предикат вычисляется
  # нормализатором в normalize_reports путём сопоставления списка
  # категорий из политики со значениями счётчиков из dotenv-файла
  # yara.env, эмитируемого job-ой.
  #
  # При наличии совпадений в категориях с разной severity применяется
  # правило худшего результата (п. 4.6 Методики) — реализовано через
  # порядок правил: FAIL проверяется раньше REVIEW.
  normalization:
    # 1. Все категории пусты → тест T004(б) фактически не проведён
    - status: "MISSING"
      when:
        all:
          - "RG_HAS_NONEMPTY_CATEGORIES == false"
      rationale: >-
        Все pattern_categories в политике объявлены пустыми (либо
        исходно patterns: [], либо все паттерны были отфильтрованы
        как невалидные/пустые строки). Тест T004(б) по п. 3.5.2(б)
        Методики фактически не проводится. В прототипе это допустимо
        как известное ограничение, но в production требует определения
        перечня оператором ИС. Согласно примечанию к таблице Г.1
        диплома, отсутствие фактической проверки фиксируется как ⊥
        (MISSING).

    # 2. Совпадения в категории с severity=FAIL → FAIL
    - status: "FAIL"
      when:
        all:
          - "existsFailCategory == true"
      rationale: >-
        Совпадение в категории, объявленной как severity: FAIL, означает
        обнаружение противоправной информации высокой степени опасности.
        Предикат existsFailCategory истинен тогда и только тогда, когда
        в pattern_categories существует категория c с c.severity == "FAIL"
        и RG_MATCH_<c.id_upper> > 0. Текущий перечень в прототипе не
        содержит таких категорий (user_defined имеет severity: REVIEW).
        Правило резервирует пространство для оператора ИС, если в
        production-конфигурации появятся FAIL-категории (например,
        паттерны экстремистских материалов из списка Минюста РФ).

    # 3. Любые совпадения в категориях с severity=REVIEW → REVIEW
    - status: "REVIEW"
      when:
        all:
          - "RG_TOTAL_MATCHES > 0"
          - "existsFailCategory == false"
      rationale: >-
        Совпадения присутствуют, но ни одно не попало в FAIL-категорию.
        Все совпадения относятся к категориям с severity: REVIEW
        и требуют экспертной верификации (Т006). По п. 4.6 Методики
        при наличии совпадений в нескольких категориях с разной
        severity применяется правило худшего результата — реализовано
        через порядок правил: FAIL проверяется раньше REVIEW.

    # 4. Иначе — чистый прогон
    - status: "PASS"
      when:
        all:
          - "RG_HAS_NONEMPTY_CATEGORIES == true"
          - "RG_TOTAL_MATCHES == 0"
      rationale: >-
        Перечень паттернов непустой, совпадений не обнаружено —
        тест T004(б) проведён штатно и не выявил противоправной
        информации.

# ====================================================================
# Расширение политики
#
# Изменение состава ruleset (для YARA), pattern_categories (для ripgrep),
# targets или правил normalization допустимо только через изменение
# этого файла. Изменения, не отражённые в файле, считаются нарушением
# политики сканирования. Файл прилагается к артефактам каждого прогона
# пайплайна для воспроизводимости и аудита (п. 4.3 Методики).
# ====================================================================
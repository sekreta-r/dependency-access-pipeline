bandit:
  engine:
    source: "pypi:bandit"
    version_pin: "bandit (latest stable from PyPI)"
  update:
    target: "runtimes/${RUNTIME}"
    excludes:
      - "tests"
    normalization:
      - status: "MISSING"
        when:
          any:
            - "BANDIT_UPDATE_TARGET_FOUND == false"
      - status: "MISSING"
        when:
          any:
            - "BANDIT_UPDATE_EXIT_CODE >= 2"
            - "BANDIT_UPDATE_JSON_PARSE_ERROR == true"
      - status: "FAIL"
        when:
          all:
            - "n_high_high > 0"
      - status: "REVIEW"
        when:
          all:
            - "n_high_any > 0"
            - "n_high_high == 0"
      - status: "PASS"
        when:
          all:
            - "BANDIT_UPDATE_EXIT_CODE in [0, 1]"
            - "BANDIT_UPDATE_JSON_PARSE_ERROR == false"
            - "n_high_any == 0"
  platform:
    target: "mlserver"
    excludes:
      - path: "mlserver/cli"
      - path: "mlserver/codecs"
      - path: "tests"
    actions:
      - action: "warn"
        when:
          any:
            - "BANDIT_PLATFORM_SEV_HIGH_CONF_HIGH > 0"
      - action: "info"
        when:
          any:
            - "BANDIT_PLATFORM_SEV_HIGH_CONF_MED > 0"
            - "BANDIT_PLATFORM_SEV_HIGH_CONF_LOW > 0"
      - action: "none"
        when:
          all:
            - "BANDIT_PLATFORM_SEV_HIGH_CONF_HIGH == 0"
            - "BANDIT_PLATFORM_SEV_HIGH_CONF_MED == 0"
            - "BANDIT_PLATFORM_SEV_HIGH_CONF_LOW == 0"

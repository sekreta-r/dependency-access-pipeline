# ====================================================================
# Политика статического анализа Python-кода (Bandit) для пайплайна
# тестирования обновлений безопасности по Методике ФСТЭК 2022 г.
# ====================================================================
#
# Назначение
#   Зафиксировать состав и границы статического анализа Python-кода
#   средствами Bandit в рамках теста Т004 (поиск опасных конструкций
#   в обновлениях безопасности, п. 3.5 Методики), а также в рамках
#   дополнительной защитной меры — анализа кода среды функционирования
#   обновления.
#
# Контекст по Методике
#   Согласно п. 3.5.1 Методики, объектом теста Т004 является "файл(ы)
#   обновления безопасности" в распакованном виде. В архитектуре
#   ml-serving-platform обновлением безопасности является изменение
#   submodule в директории runtimes/${RUNTIME}/, соответствующее
#   обновлению runtime-зависимости (например, scikit-learn). Код
#   платформы инференса (директория mlserver/) обновлением безопасности
#   не является и сканируется в рамках дополнительной меры контроля
#   среды функционирования.
#
# Разделение прогонов
#   1. update   — сканирование кода обновления безопасности.
#                 Закрывает п. 3.5.2(а) со стороны статического анализа
#                 исходного Python-кода.
#                 Объект: runtimes/${RUNTIME}/.
#                 Политика: сильная. Любая находка HIGH/HIGH
#                 квалифицируется по таблице 1 Приложения № 1 как
#                 "опасные конструкции найдены" (красный).
#
#   2. platform — сканирование кода среды функционирования.
#                 Дополнительная мера, не предусмотренная Методикой.
#                 Объект: mlserver/, за исключением путей, не входящих
#                 в runtime-путь сервиса инференса (см. ниже).
#                 Политика: ослабленная. Любая находка HIGH/HIGH
#                 квалифицируется как "потенциально опасные конструкции,
#                 идентифицировать назначение которых не удалось"
#                 (жёлтый, MANUAL_REVIEW).

scans:

  update:
    description: >-
      Статический анализ исходного Python-кода обновления безопасности.
      Прогон выполняется по директории runtimes/${RUNTIME}/, на которую
      указывает submodule, обновляемый в текущем пайплайне.
    target: "runtimes/${RUNTIME}"
    excludes:
      - "tests"            # тестовые фикстуры содержат assert и фиктивные
                           # секреты, что приводит к ложным срабатываниям
                           # B101/B105 и не относится к runtime-пути.
    severity_policy: "strict"
    normalization:
      high_high_maps_to: "RED"       # таблица 1 Приложения № 1
      high_any_maps_to:  "YELLOW"

  platform:
    description: >-
      Статический анализ кода среды функционирования обновления
      (платформа инференса MLServer). Прогон выполняется как
      дополнительная защитная мера, не предусмотренная Методикой
      напрямую, но усиливающая проверку контекста, в котором будет
      исполняться обновление.
    target: "mlserver"

    excludes:

      - path: "mlserver/cli"
        rationale: >-
          CLI-команды платформы (mlserver build, mlserver init и др.)
          выполняются на машине разработчика на этапе подготовки
          образа и не входят в runtime-путь сервиса инференса,
          развёрнутого в Kubernetes. Аргументы CLI поступают от
          разработчика интерактивно, а не из внешних источников
          в production. Опасные конструкции в этом коде не имеют
          вектора эксплуатации в среде функционирования.

      - path: "mlserver/codecs"
        rationale: >-
          Модуль кодеков MLServer реализует (де)сериализацию входных
          и выходных payload'ов API инференса, в том числе через
          pickle (B301) для совместимости с моделями, обученными
          вне платформы. Использование pickle в этом контексте
          является штатным механизмом инференса и не относится
          к классу supply-chain рисков, на которые направлен тест Т004.
          Контроль вектора десериализации обеспечивается
          контрактным fuzzing'ом API (тест Т005, schemathesis_fuzz)
          и сканированием бинарных артефактов на IoC (yara_scan).

      - path: "tests"
        rationale: >-
          Тестовый код содержит фикстуры с фиктивными секретами,
          assert-выражения, отключённые проверки таймаутов и иные
          конструкции, классифицируемые Bandit как HIGH/HIGH, но
          не присутствующие в production-runtime сервиса. Сканирование
          тестового кода не закрывает требований Методики.

    severity_policy: "relaxed"
    normalization:
      high_high_maps_to: "YELLOW"    # ослаблено относительно update
      high_any_maps_to:  "INFO"      # информационный, не блокирующий

# ====================================================================
# Расширение политики
#
# Изменение состава excludes допустимо только при условии
# документирования rationale в этом файле. Изменения, не отражённые
# в этом файле, считаются нарушением политики сканирования.
# ====================================================================
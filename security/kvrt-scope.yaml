# ====================================================================
# Политика антивирусного контроля средствами KVRT (Kaspersky Virus
# Removal Tool) для пайплайна тестирования обновлений безопасности
# по Методике ФСТЭК 2022 г.
# ====================================================================
#
# Назначение
#   Зафиксировать состав, границы и правила нормализации результатов
#   антивирусного контроля обновления безопасности средством KVRT
#   в рамках теста Т003 (антивирусный контроль обновлений безопасности,
#   п. 3.4 Методики).
#
#   Политика регламентирует Уровень 1 формальной модели — переход
#   от сырых признаков, эмитируемых job-ой av_scan_pre_kvrt,
#   к статусу инструмента в множестве {PASS, REVIEW, MISSING}
#   (см. таблица Г.1 диплома). Агрегация статуса с парным источником
#   и определение цвета теста Т003 выполняются на Уровне 2 по
#   отдельной политике, не входящей в настоящий файл.
#
# Контекст по Методике
#   Согласно п. 3.4.1 Методики, антивирусный контроль обновлений
#   безопасности проводится "не менее чем двумя средствами антивирусной
#   защиты разных разработчиков". KVRT (АО «Лаборатория Касперского»,
#   запись в реестре российского ПО) выступает одним из двух
#   антивирусных движков, требуемых п. 3.4.1.
#
#   Настоящая политика регламентирует прогон KVRT в режиме п. 3.4.2(а)
#   Методики — pre-build, по объектам обновления в распакованном виде.
#   Прогон KVRT в режиме (б) регламентируется отдельной политикой
#   kvrt-post-scope.yaml.
# ====================================================================
kvrt:
  # ── Метаданные инструмента ─────────────────────────────────────────
  # KVRT поставляется в виде self-extracting бинарного файла kvrt.run,
  # содержащего движок и встроенные сигнатурные базы на момент
  # формирования релиза. Бинарь хранится во внутреннем Generic Package
  # Registry проекта и обновляется отдельным пайплайном по расписанию
  # с фиксацией SHA256. Версия сигнатур фиксируется через метаданные
  # релиза в registry; на стороне CI верифицируется только контрольная
  # сумма скачанного бинаря.
  engine:
    source: "internal_generic_registry"
    package: "kvrt"
    version_ref: "latest"
    binary_name: "kvrt.run"
    sha256_artifact: "kvrt.run.sha256"
    rationale: >-
      KVRT не публикуется через freshclam-подобный механизм обновления
      сигнатур: каждый релиз — это новый self-extracting бинарь
      со встроенными базами. Релиз кэшируется во внутреннем Generic
      Package Registry, что обеспечивает воспроизводимость прогона
      (нет зависимости от доступности внешнего источника в момент
      сканирования) и контроль целостности через SHA256. Подробности
      процедуры публикации релиза в registry — в отдельном пайплайне
      обновления антивирусных средств (вне настоящего файла).
  # ── Объекты сканирования ──────────────────────────────────────────
  # KVRT сканирует те же два объекта, что ClamAV и YARA, для
  # обеспечения сопоставимости и единого периметра T003/T004.
  targets:
    - name: "update_source"
      path: "scan-target/repo"
      description: >-
        Исходный Python-код обновления безопасности (runtimes/${RUNTIME}/).
        Соответствует п. 3.4.2(а) Методики.
    - name: "update_artifact"
      path: "scan-target/wheel"
      description: >-
        Распакованный wheel-архив обновляемого пакета, верифицированный
        по контрольной сумме в fetch_artifact (Т001).
  # ── Параметры запуска сканера ─────────────────────────────────────
  # Флаги KVRT задают неинтерактивный режим, ограничивают периметр
  # сканирования пользовательской директорией (-customonly) и
  # отключают шифрование отчётов (-dontencrypt) для возможности
  # машинного парсинга в normalize_reports.
  scan_options:
    flags:
      - "-accepteula"
      - "-silent"
      - "-dontencrypt"
      - "-customonly"
    custom_path: "scan-target"
    rationale: >-
      Опция -customonly критически важна: без неё KVRT сканирует
      пользовательскую директорию плюс системные каталоги контейнера
      раннера, что приводит к ложным срабатываниям на артефактах
      базового образа Ubuntu и кратно увеличивает время прогона.
      -dontencrypt необходим для машинного парсинга XML-отчётов
      в KVRT2024_Data/Reports/.
  # ── Особенности KVRT, влияющие на нормализацию ─────────────────────
  # 1. KVRT не имеет стабильно документированного списка exit codes:
  #    ненулевой exit может означать как ошибку, так и факт обнаружения
  #    угроз. Поэтому для квалификации результата ниже используется
  #    комбинация маркеров stdout и наличия XML-отчётов.
  # 2. KVRT может завершиться с exit=0 без выполнения скана, если
  #    бинарь не получил доступ к указанной директории. Поэтому
  #    наличие маркера "Scan finished" в stdout проверяется отдельно.
  # 3. KVRT2024_Data/Reports/ создаётся в одной из нескольких возможных
  #    директорий (/var/opt, /root, $PWD), что отражено в job-логике
  #    обхода кандидатов. Для нормализации достаточно булева флага
  #    "отчёт найден или нет".
  # ── Нормализация результатов (Уровень 1, таблица Г.1 диплома) ────
  # Сырые признаки, эмитируемые job-ой av_scan_pre_kvrt:
  #   KVRT_PRE_EXIT_CODE             — exit code kvrt.run
  #   KVRT_PRE_DETECTED_COUNT        — число обнаружений (макс. из
  #                                    stdout и XML-отчётов)
  #   KVRT_PRE_SCAN_FINISHED_MARKER  — найден ли "Scan finished"
  #                                    в stdout (bool)
  #   KVRT_PRE_REPORT_FOUND          — найдена ли директория
  #                                    KVRT2024_Data/Reports/ (bool)
  #   KVRT_PRE_FATAL_ERROR_MARKER    — найдены ли паттерны fatal/cannot
  #                                    в stdout (bool)
  #   KVRT_PRE_WHEEL_FOUND           — был ли найден wheel
  #   KVRT_PRE_REPO_SOURCE_FOUND     — был ли найден исходный код
  #
  # Правила применяются в порядке приоритета: первое сработавшее
  # определяет итоговый статус. Согласно примечанию таблицы Г.1
  # диплома, статус FAIL на уровне отдельного антивирусного
  # инструмента не выставляется.
  normalization:
    # 1. Отсутствие входных артефактов → недостаток данных
    - status: "MISSING"
      when:
        all:
          - "KVRT_PRE_WHEEL_FOUND == false"
          - "KVRT_PRE_REPO_SOURCE_FOUND == false"
      rationale: >-
        Ни один объект сканирования не сформирован. Инструмент
        не может вынести заключение. Согласно примечанию к таблице Г.1
        диплома, фиксируется как ⊥ (MISSING) и переводит автомат EFSM
        в состояние q₇ через δ1.1.
    # 2. Скан не завершился штатно → недостаток данных
    - status: "MISSING"
      when:
        any:
          - "KVRT_PRE_SCAN_FINISHED_MARKER == false"
          - "KVRT_PRE_FATAL_ERROR_MARKER == true"
      rationale: >-
        Отсутствие маркера "Scan finished" в stdout либо наличие
        паттернов fatal/cannot означает, что KVRT не завершил
        сканирование штатно. В силу отсутствия стандартизированных
        exit codes у KVRT (см. секцию "Особенности KVRT" выше),
        достоверным признаком завершения скана является исключительно
        вывод stdout. Без него валидный отчёт инструмента отсутствует,
        статус — ⊥ (MISSING).
    # 3. Скан штатно завершился, но отчёт не найден → недостаток данных
    - status: "MISSING"
      when:
        all:
          - "KVRT_PRE_SCAN_FINISHED_MARKER == true"
          - "KVRT_PRE_REPORT_FOUND == false"
          - "KVRT_PRE_DETECTED_COUNT == 0"
      rationale: >-
        KVRT сообщил о завершении скана, но XML-отчёт в KVRT2024_Data
        не создан. Подтверждения от штатных отчётов инструмента нет.
        В силу запрета на квалификацию только по stdout, без
        подтверждения структурированным отчётом, статус — ⊥ (MISSING).
        Этот случай встречается, когда KVRT исполняется в окружении,
        где он не может писать в системные директории.
    # 4. Обнаружения → требуется обзор
    - status: "REVIEW"
      when:
        any:
          - "KVRT_PRE_DETECTED_COUNT > 0"
      rationale: >-
        KVRT, как и ClamAV, не различает в отчёте точные сигнатурные
        и эвристические совпадения. Согласно примечанию таблицы Г.1
        диплома, статус FAIL не выставляется на уровне отдельного
        антивирусного инструмента; квалификация находки происходит
        на Уровне 2. Достаточным условием REVIEW является наличие
        обнаружений в максимуме (stdout, XML), что покрывает оба
        источника и делает признак робастным к возможным расхождениям
        между ними.
    # 5. Иначе — чистый прогон
    - status: "PASS"
      when:
        all:
          - "KVRT_PRE_SCAN_FINISHED_MARKER == true"
          - "KVRT_PRE_REPORT_FOUND == true"
          - "KVRT_PRE_DETECTED_COUNT == 0"
          - "KVRT_PRE_FATAL_ERROR_MARKER == false"
      rationale: >-
        Выполнены все необходимые условия чистого прогона:
        - скан штатно завершён (маркер Scan finished);
        - сформирован структурированный отчёт KVRT2024_Data/Reports/;
        - в максимуме (stdout, XML) обнаружений нет;
        - в stdout нет паттернов fatal/cannot.
        В отличие от ClamAV, exit code не используется как критерий
        чистоты — см. секцию "Особенности KVRT" выше.
# ====================================================================
# Расширение политики
#
# Изменение версии engine, опций scan_options, состава targets или
# правил normalization допустимо только через изменение этого файла.
# Изменения, не отражённые в файле, считаются нарушением политики.
# Файл прилагается к артефактам каждого прогона пайплайна для
# воспроизводимости и аудита (п. 4.3 Методики).
# ====================================================================
# ====================================================================
# Политика антивирусного контроля средствами ClamAV для пайплайна
# тестирования обновлений безопасности по Методике ФСТЭК 2022 г.
# ====================================================================
#
# Назначение
#   Зафиксировать состав, границы и правила нормализации результатов
#   антивирусного контроля обновления безопасности средством ClamAV
#   в рамках теста Т003 (антивирусный контроль обновлений безопасности,
#   п. 3.4 Методики).
#
#   Политика регламентирует Уровень 1 формальной модели — переход
#   от сырых признаков, эмитируемых job-ой av_scan_pre_clamav,
#   к статусу инструмента в множестве {PASS, REVIEW, MISSING}
#   (см. таблица Г.1 диплома). Агрегация статуса с парным источником
#   и определение цвета теста Т003 выполняются на Уровне 2 по
#   отдельной политике, не входящей в настоящий файл.
#
# Контекст по Методике
#   Согласно п. 3.4.1 Методики, антивирусный контроль обновлений
#   безопасности проводится "не менее чем двумя средствами антивирусной
#   защиты разных разработчиков". ClamAV (Cisco Talos) выступает
#   одним из двух антивирусных движков, требуемых п. 3.4.1.
#
#   Согласно п. 3.4.2 Методики, антивирусный контроль предусматривает:
#     а) проверку обновления безопасности до его установки;
#     б) сигнатурный и эвристический анализ оперативной памяти,
#        файловой системы и загрузочных секторов после установки.
#
#   Настоящая политика регламентирует прогон ClamAV в режиме (а) —
#   pre-build, по объектам обновления в распакованном виде. Прогон
#   ClamAV в режиме (б) регламентируется отдельной политикой
#   clamav-post-scope.yaml.
# ====================================================================
clamav:
  # ── Метаданные инструмента ─────────────────────────────────────────
  # Используется официальный контейнерный образ ClamAV/clamav:stable.
  # Версия движка и версия сигнатурных баз фиксируются в каждом прогоне
  # в артефактах clamav-engine-version.txt и clamav-sigversion.txt
  # для воспроизводимости результатов проверки (п. 4.3 Методики).
  engine:
    source: "clamav/clamav:stable"
    signatures_source: "freshclam (database.clamav.net)"
    rationale: >-
      Официальный образ ClamAV от Cisco Talos. Обновление сигнатур
      выполняется freshclam в отдельном контейнере непосредственно
      перед сканированием; версии main.cvd и daily.cvd фиксируются
      в артефактах. ClamAV выбран как открытый антивирусный движок
      с контейнерным дистрибутивом, пригодным для статического
      сканирования pre-build артефактов в pipeline без агента.
  # ── Объекты сканирования ──────────────────────────────────────────
  # ClamAV сканирует те же два объекта, что и YARA в yara-scope.yaml,
  # для обеспечения сопоставимости и единого периметра T003/T004.
  # Сканирование выполняется на pre-build стадии, до сборки образа.
  targets:
    - name: "update_source"
      description: >-
        Исходный Python-код обновления безопасности — директория
        runtimes/${RUNTIME}/, на которую указывает submodule,
        обновляемый в текущем пайплайне. Соответствует п. 3.4.2(а)
        Методики в части проверки обновления до его установки
        в составе образа.
      path: "scan-target/repo"
    - name: "update_artifact"
      description: >-
        Распакованный wheel-архив обновляемого пакета, загруженный
        непосредственно из PyPI и верифицированный по контрольной
        сумме в fetch_artifact (тест Т001). Объект включает как
        Python-исходники, так и скомпилированные расширения (.so),
        в которых могут располагаться вредоносные конструкции,
        не обнаруживаемые при анализе только исходного кода.
      path: "scan-target/wheel"
  # ── Параметры запуска сканера ─────────────────────────────────────
  # max_filesize / max_scansize расширены относительно умолчаний ClamAV
  # (25 MB / 100 MB) из-за наличия в типовых ML-пакетах крупных
  # бинарных артефактов (numpy, scipy в зависимостях scikit-learn,
  # libllama.so в зависимостях llama-cpp и т.п.). При превышении
  # лимита clamscan печатает WARNING и НЕ завершается с exit=2,
  # поэтому количество таких предупреждений учитывается на этапе
  # нормализации (см. секцию normalization ниже).
  scan_options:
    recursive: true
    infected_only: true            # печатать только заражённые файлы
    max_filesize: "500M"
    max_scansize: "2000M"
    rationale: >-
      Опции инфраструктурные. Дополнительные параметры обнаружения
      (heuristic-alerts, alert-broken и т.п.) на текущем этапе
      не активированы — состав детектирования определяется штатным
      набором сигнатурных и эвристических правил движка ClamAV,
      зафиксированных в clamav-sigversion.txt.
  # ── Нормализация результатов (Уровень 1, таблица Г.1 диплома) ────
  # Сырые признаки, эмитируемые job-ой av_scan_pre_clamav:
  #   CLAMAV_PRE_EXIT_CODE         — exit code clamscan
  #                                  (0=clean, 1=infected, 2=error,
  #                                   иное — техническая ошибка)
  #   CLAMAV_PRE_INFECTED_FILES    — число заражённых файлов из summary
  #   CLAMAV_PRE_SIZE_WARNINGS     — число WARNING-сообщений
  #                                  о превышении лимитов размера
  #   CLAMAV_PRE_WHEEL_FOUND       — был ли найден wheel-артефакт
  #   CLAMAV_PRE_REPO_SOURCE_FOUND — был ли найден исходный код
  #
  # Правила применяются в порядке приоритета: первое сработавшее
  # определяет итоговый статус. Согласно примечанию таблицы Г.1
  # диплома, статус FAIL на уровне отдельного антивирусного
  # инструмента не выставляется; квалификация находки происходит
  # на Уровне 2.
  normalization:
    # 1. Отсутствие входных артефактов → недостаток данных
    - status: "MISSING"
      when:
        all:
          - "CLAMAV_PRE_WHEEL_FOUND == false"
          - "CLAMAV_PRE_REPO_SOURCE_FOUND == false"
      rationale: >-
        Если ни один из объектов сканирования не был сформирован
        (wheel не загружен в fetch_artifact, submodule не обновлён),
        инструмент не может вынести заключение. Согласно примечанию
        к таблице Г.1 диплома, ситуация фиксируется как ⊥ (MISSING)
        и приводит автомат EFSM в состояние q₇ через переход δ1.1.
    # 2. Техническая ошибка сканирования → недостаток данных
    - status: "MISSING"
      when:
        any:
          - "CLAMAV_PRE_EXIT_CODE == 2"
          - "CLAMAV_PRE_EXIT_CODE > 2"
      rationale: >-
        Exit code 2 документирован man clamscan как "an error
        occurred". Любое иное ненулевое значение, кроме 1
        (infected), также интерпретируется как техническая ошибка.
        В обоих случаях валидный отчёт инструмента отсутствует,
        статус — ⊥ (MISSING). Соответствует строгому прочтению
        примечания Г.1 диплома: scan_error влечёт ⊥, а не REVIEW.
    # 3. Частичное покрытие из-за превышения лимитов размера → ⊥
    - status: "MISSING"
      when:
        all:
          - "CLAMAV_PRE_SIZE_WARNINGS > 0"
      rationale: >-
        ClamAV при превышении max-filesize/max-scansize пропускает
        файлы с печатью WARNING и не завершается с ошибкой. Без
        учёта этого условия exit=0 при наличии непроверенных файлов
        ошибочно трактовался бы как PASS. Соответствует требованию
        полноты покрытия объекта сканирования (п. 3.4.2(а) Методики)
        и определению ⊥ из примечания Г.1 диплома.
    # 4. Сигнатурные/эвристические совпадения → требуется обзор
    - status: "REVIEW"
      when:
        any:
          - "CLAMAV_PRE_EXIT_CODE == 1"
          - "CLAMAV_PRE_INFECTED_FILES > 0"
      rationale: >-
        ClamAV не различает в отчёте точные сигнатурные
        и эвристические совпадения, что препятствует автоматической
        квалификации находки как FAIL. Согласно примечанию таблицы
        Г.1 диплома, статус FAIL не выставляется на уровне отдельного
        антивирусного инструмента; квалификация находки происходит
        на Уровне 2.
    # 5. Иначе — чистый прогон
    - status: "PASS"
      when:
        all:
          - "CLAMAV_PRE_EXIT_CODE == 0"
          - "CLAMAV_PRE_INFECTED_FILES == 0"
          - "CLAMAV_PRE_SIZE_WARNINGS == 0"
      rationale: >-
        Выполнены все необходимые условия чистого прогона:
        корректный exit code, отсутствие заражённых файлов,
        полное покрытие объекта сканирования (нет WARNING
        о превышении лимитов).
# ====================================================================
# Расширение политики
#
# Изменение версии engine, опций scan_options, состава targets или
# правил normalization допустимо только через изменение этого файла.
# Изменения, не отражённые в файле, считаются нарушением политики.
# Файл прилагается к артефактам каждого прогона пайплайна для
# воспроизводимости и аудита (п. 4.3 Методики).
# ====================================================================
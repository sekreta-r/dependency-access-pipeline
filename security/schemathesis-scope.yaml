schemathesis:
  engine:
    source: "pypi:schemathesis<4"
    report_format: "junit"
  target:
    name: "deployed_service_api"
    endpoint: "http://localhost:8080"
    openapi_path: "/v2/docs/dataplane.json"
    health_path: "/v2/health/ready"
  scan_options:
    max_examples: 20
    checks: "all"
    suppress_health_checks:
      - "filter_too_much"
  normalization:
    - status: "MISSING"
      when:
        any:
          - "SCHEMATHESIS_DEPLOY_OK == false"
    - status: "MISSING"
      when:
        any:
          - "SCHEMATHESIS_ENDPOINT_READY == false"
          - "SCHEMATHESIS_OPENAPI_FETCHED == false"
    - status: "MISSING"
      when:
        any:
          - "SCHEMATHESIS_XML_PARSE_ERROR == true"
          - "SCHEMATHESIS_EXIT_CODE >= 2"
          - "SCHEMATHESIS_ERRORS > 0"
    - status: "FAIL"
      when:
        all:
          - "SCHEMATHESIS_HAS_5XX == true"
    - status: "REVIEW"
      when:
        any:
          - "SCHEMATHESIS_FAILED_CHECKS > 0"
          - "SCHEMATHESIS_SCHEMA_VIOLATIONS > 0"
    - status: "PASS"
      when:
        all:
          - "SCHEMATHESIS_SCAN_ERROR == false"
          - "SCHEMATHESIS_TOTAL_CHECKS > 0"
          - "SCHEMATHESIS_FAILED_CHECKS == 0"
          - "SCHEMATHESIS_HAS_5XX == false"
          - "SCHEMATHESIS_SCHEMA_VIOLATIONS == 0"

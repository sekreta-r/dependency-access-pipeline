# ====================================================================
# Политика контрактного fuzzing'а API средствами Schemathesis для
# пайплайна тестирования обновлений безопасности по Методике
# ФСТЭК 2022 г.
# ====================================================================
#
# Назначение
#   Зафиксировать состав, границы и правила нормализации результатов
#   property-based fuzzing'а HTTP API развёрнутого сервиса средством
#   Schemathesis в рамках теста Т005 (мониторинг активности обновлений
#   безопасности в среде тестирования, п. 3.6 Методики).
#
#   Политика регламентирует Уровень 1 формальной модели — переход
#   от сырых признаков, эмитируемых job-ой schemathesis_fuzz,
#   к статусу инструмента в множестве {PASS, REVIEW, FAIL, MISSING}
#   (см. таблица Г.1 диплома). Агрегация статуса с парными инструментами
#   теста Т005 (Grype, ZAP) и определение цвета теста выполняются
#   на Уровне 2 по отдельной политике, не входящей в настоящий файл.
#
# Контекст по Методике
#   Согласно п. 3.6.3 Методики, мониторинг активности обновлений
#   безопасности предусматривает четыре подпункта:
#     а) анализ системных вызовов;
#     б) анализ сетевых пакетов;
#     в) анализ состава файловой системы до и после установки;
#     г) сигнатурный поиск известных уязвимостей.
#
#   Schemathesis закрывает подпункт (б) на HTTP-уровне через
#   property-based fuzzing API-контракта: для каждого endpoint'а,
#   объявленного в OpenAPI, инструмент генерирует случайные входные
#   данные (согласно declared schema) и проверяет, что ответы сервиса
#   соответствуют декларированной спецификации. Это отличается
#   от подхода ZAP (поиск уязвимостей по классам атак — см.
#   zap-scope.yaml): Schemathesis ищет расхождения между реализацией
#   и контрактом, ZAP ищет уязвимости в реализации. Оба инструмента
#   совместно покрывают подпункт (б) с разных сторон.
#
# Семантика обнаружений
#   Schemathesis фиксирует несколько классов проблем:
#     - 5xx response — внутренняя ошибка сервиса при валидном
#       входе (потенциальный DoS-вектор);
#     - schema violations — структура ответа не соответствует
#       декларированному schema (нарушение контракта);
#     - status code violations — неожиданный статус-код;
#     - content type violations — неожиданный Content-Type.
#
#   Эти проблемы не являются "уязвимостями" в классическом смысле,
#   но в контексте обновления безопасности они сигнализируют
#   о регрессе в поведении API, что согласно п. 3.6.4 Методики
#   может быть признаком недекларированной возможности — например,
#   изменение поведения endpoint'а после применения обновления
#   относительно его публичной спецификации.
# ====================================================================
schemathesis:
  # ── Метаданные движка ─────────────────────────────────────────────
  engine:
    source: "pypi:schemathesis<4"
    version_pin_rationale: >-
      Pin schemathesis<4 зафиксирован на стабильную ветку 3.x.
      Версия 4.x имеет переработанный CLI и формат отчёта, что
      потребует обновления job_парсинга. Версия движка фиксируется
      в каждом прогоне в артефакте schemathesis-engine-version.txt
      для воспроизводимости (п. 4.3 Методики).
    report_format: "junit"
    report_format_rationale: >-
      JUnit XML выбран как основной формат отчёта по причине
      стабильности схемы и универсальности парсинга через
      стандартные инструменты (xmlstarlet). Текстовый stdout
      используется как fallback для извлечения деталей,
      отсутствующих в JUnit (5xx-counts, schema violations
      по типам), что аналогично двухисточниковой стратегии
      KVRT (см. kvrt-scope.yaml).

  # ── Объект сканирования ──────────────────────────────────────────
  target:
    name: "deployed_service_api"
    description: >-
      HTTP API развёрнутого в тестовом Kubernetes-кластере сервиса
      MLServer. Тестируется тот же endpoint, что и для ZAP, по той
      же OpenAPI-спецификации, что обеспечивает согласованность
      объекта сканирования между двумя инструментами подпункта (б).
    endpoint: "http://localhost:8080"
    openapi_path: "/v2/docs/dataplane.json"
    health_path: "/v2/health/ready"
    coverage_notes: >-
      Объект сканирования — runtime endpoint, развёрнутый из образа,
      собранного в build_image. Schemathesis сканирует все endpoint'ы,
      перечисленные в OpenAPI-спецификации. Endpoint'ы, не объявленные
      в спецификации (например, internal-only admin endpoint'ы),
      не покрываются. Для контроля таких endpoint'ов требуется либо
      их декларация в OpenAPI, либо дополнительное сканирование
      по списку.

  # ── Параметры сканера ─────────────────────────────────────────────
  scan_options:
    max_examples: 20
    max_examples_rationale: >-
      Число случайных тестовых примеров, генерируемых property-based
      движком hypothesis для каждого endpoint'а. Значение 20
      установлено для прототипа как компромисс между покрытием
      и временем выполнения (для API из ~10 endpoint'ов время
      прогона составляет порядка минуты). В production-конфигурации
      рекомендуется значение 200..1000, что увеличит вероятность
      обнаружения граничных случаев, но соответственно увеличит
      время прогона. Изменение значения отражается в артефакте
      schemathesis-engine-version.txt для воспроизводимости.

    checks: "all"
    checks_rationale: >-
      Значение "all" включает все встроенные property-checks
      Schemathesis: not_a_server_error (отсутствие 5xx),
      status_code_conformance (status code входит в declared list),
      content_type_conformance (Content-Type входит в declared list),
      response_schema_conformance (структура ответа соответствует
      JSON schema). Применение всех проверок обеспечивает максимальное
      покрытие контракта API.

    suppress_health_checks:
      - "filter_too_much"
    suppress_health_checks_rationale: >-
      filter_too_much подавляется, потому что MLServer API имеет
      специфические input constraints (например, размеры тензоров),
      и встроенный hypothesis health-check ложно срабатывает
      на этих ограничениях, что приводит к преждевременному
      прерыванию прогона. Подавление этой проверки не влияет
      на качество fuzzing'а.

  # ── Нормализация результатов (Уровень 1, таблица Г.1) ────────────
  # Сырые признаки, эмитируемые job-ой schemathesis_fuzz:
  #   SCHEMATHESIS_DEPLOY_OK              — был ли успешный deploy
  #   SCHEMATHESIS_ENDPOINT_READY         — отвечает ли health endpoint
  #   SCHEMATHESIS_OPENAPI_FETCHED        — удалось ли скачать OpenAPI
  #   SCHEMATHESIS_EXIT_CODE              — exit code schemathesis run
  #   SCHEMATHESIS_XML_PARSE_ERROR        — валиден ли JUnit XML
  #   SCHEMATHESIS_SCAN_ERROR             — сводный флаг тех.ошибки
  #
  #   SCHEMATHESIS_TOTAL_CHECKS           — общее число проверок
  #   SCHEMATHESIS_FAILED_CHECKS          — провалившиеся проверки
  #   SCHEMATHESIS_ERRORS                 — ошибки исполнения
  #                                          (отличаются от failures —
  #                                           это ошибки внутри
  #                                           инструмента, не сервиса)
  #
  #   SCHEMATHESIS_HAS_5XX                — был ли 5xx response
  #   SCHEMATHESIS_HAS_5XX_COUNT          — сколько 5xx responses
  #   SCHEMATHESIS_SCHEMA_VIOLATIONS      — счётчик schema violations
  #
  #   SCHEMATHESIS_MAX_EXAMPLES           — из политики, для аудита
  #   SCHEMATHESIS_CHECKS                 — из политики, для аудита
  #
  # Правила применяются в порядке приоритета.
  normalization:
    # 1. Отсутствие успешного deploy → недостаток данных
    - status: "MISSING"
      when:
        any:
          - "SCHEMATHESIS_DEPLOY_OK == false"
      rationale: >-
        deploy_to_test_k8s не сообщил об успешном развёртывании.
        Без работающего сервиса Schemathesis физически не может
        выполнить fuzzing. Согласно примечанию к таблице Г.1
        диплома, фиксируется как ⊥ (MISSING) и переводит автомат
        EFSM в q₇ через δ1.1.

    # 2. Endpoint недоступен или OpenAPI отсутствует → MISSING
    - status: "MISSING"
      when:
        any:
          - "SCHEMATHESIS_ENDPOINT_READY == false"
          - "SCHEMATHESIS_OPENAPI_FETCHED == false"
      rationale: >-
        deploy формально завершился успешно, но endpoint
        не отвечает или OpenAPI-спецификация недоступна.
        Schemathesis property-based подход полностью зависит
        от наличия валидной OpenAPI-спецификации: без неё
        невозможно генерировать тестовые входы. Статус — ⊥.

    # 3. Техническая ошибка исполнения → MISSING
    - status: "MISSING"
      when:
        any:
          - "SCHEMATHESIS_XML_PARSE_ERROR == true"
          - "SCHEMATHESIS_EXIT_CODE >= 2"
          - "SCHEMATHESIS_ERRORS > 0"
      rationale: >-
        JUnit-отчёт повреждён или не сформирован, exit code >= 2
        (внутренняя ошибка инструмента, не связанная с сервисом),
        либо в отчёте присутствуют ERRORS — отметки об ошибках
        инструмента (не сервиса). Schemathesis различает failures
        (тест выявил расхождение в сервисе) и errors (тест не смог
        выполниться по техническим причинам). Errors означают,
        что часть проверок не была проведена, что фиксируется
        как ⊥ (неполнота покрытия).

    # 4. 5xx response при валидном входе → FAIL
    - status: "FAIL"
      when:
        all:
          - "SCHEMATHESIS_HAS_5XX == true"
      rationale: >-
        Получен 5xx HTTP response на валидный (по schema) запрос —
        это означает, что сервис падает на корректных входных
        данных. Согласно п. 3.6.4 Методики, признаком успешного
        прохождения теста является отсутствие признаков НДВ;
        внутренний сбой сервиса на корректных данных является
        потенциальным признаком НДВ (например, неожиданное падение
        после применения обновления, не воспроизводящееся
        на оригинальной версии). Статус — FAIL, что переводит
        автомат EFSM в q₁₀ REJECT через q₃→q₆. Замечание:
        для интеграционных тестов в production-окружении этот
        порог может быть смягчён до REVIEW, если 5xx ожидаемы
        для определённых классов входов; в прототипе принят
        строгий вариант согласно принципу консервативности.

    # 5. Schema violations или failed checks → REVIEW
    - status: "REVIEW"
      when:
        any:
          - "SCHEMATHESIS_FAILED_CHECKS > 0"
          - "SCHEMATHESIS_SCHEMA_VIOLATIONS > 0"
      rationale: >-
        Обнаружены расхождения между фактическим поведением API
        и декларированным контрактом, но без 5xx-ответов.
        Это означает, что сервис отвечает, но не так, как обещано
        в OpenAPI-спецификации — например, возвращает 404 вместо
        200, неожиданный Content-Type, или структура response
        не соответствует JSON schema. Такие расхождения могут
        быть результатом регрессии при обновлении и требуют
        экспертной верификации (Т006) для определения, является
        ли это намеренным изменением API или признаком НДВ.

    # 6. Иначе — чистый прогон
    - status: "PASS"
      when:
        all:
          - "SCHEMATHESIS_SCAN_ERROR == false"
          - "SCHEMATHESIS_TOTAL_CHECKS > 0"
          - "SCHEMATHESIS_FAILED_CHECKS == 0"
          - "SCHEMATHESIS_HAS_5XX == false"
          - "SCHEMATHESIS_SCHEMA_VIOLATIONS == 0"
      rationale: >-
        Сканирование штатно завершилось, выполнено как минимум
        одно успешное property-проверка (TOTAL_CHECKS > 0),
        отсутствуют failures, 5xx-ответы и schema violations.
        Условие TOTAL_CHECKS > 0 предотвращает ложноположительный
        PASS при пустом прогоне (например, если OpenAPI содержит
        endpoint'ы, но Schemathesis не смог сгенерировать
        ни одного валидного входа).

# ====================================================================
# Замечание о связи Schemathesis с подпунктами Методики
#
# Schemathesis формально регламентирован настоящей политикой
# как инструмент подпункта 3.6.3(б) — анализ сетевых пакетов
# (HTTP-уровень). Однако его сильная сторона — выявление
# расхождений с контрактом — частично также покрывает подпункт
# 3.6.4 Методики о признаках недекларированных возможностей,
# где формулировка "недекларированные возможности" может быть
# интерпретирована как "поведение, не декларированное в OpenAPI".
#
# Это даёт Schemathesis уникальную роль в наборе инструментов
# теста Т005: он единственный, кто работает на пересечении
# 3.6.3(б) и 3.6.4. ZAP закрывает 3.6.3(б) с точки зрения
# классов уязвимостей, Grype — 3.6.3(г) с точки зрения известных
# CVE; Schemathesis закрывает 3.6.3(б) и часть 3.6.4 с точки
# зрения контрактного соответствия.
# ====================================================================

# ====================================================================
# Расширение политики
#
# Изменение источника engine, параметров scan_options или правил
# normalization допустимо только через изменение этого файла.
# Изменения, не отражённые в файле, считаются нарушением политики
# сканирования. Файл прилагается к артефактам каждого прогона
# пайплайна для воспроизводимости и аудита (п. 4.3 Методики).
# ====================================================================
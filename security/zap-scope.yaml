# ====================================================================
# Политика динамического тестирования API средствами OWASP ZAP
# для пайплайна тестирования обновлений безопасности по Методике
# ФСТЭК 2022 г.
# ====================================================================
#
# Назначение
#   Зафиксировать состав, границы и правила нормализации результатов
#   динамического анализа HTTP API развёрнутого сервиса средством
#   OWASP ZAP в рамках теста Т005 (мониторинг активности обновлений
#   безопасности в среде тестирования, п. 3.6 Методики).
#
#   Политика регламентирует Уровень 1 формальной модели — переход
#   от сырых признаков, эмитируемых job-ой zap_scan, к статусу
#   инструмента в множестве {PASS, REVIEW, FAIL, MISSING} (см. таблица
#   Г.1 диплома). Агрегация статуса с парными инструментами теста Т005
#   (Grype, Schemathesis) и определение цвета теста выполняются
#   на Уровне 2 по отдельной политике, не входящей в настоящий файл.
#
# Контекст по Методике
#   Согласно п. 3.6.3 Методики, мониторинг активности обновлений
#   безопасности предусматривает четыре подпункта:
#     а) анализ системных вызовов;
#     б) анализ сетевых пакетов;
#     в) анализ состава файловой системы до и после установки;
#     г) сигнатурный поиск известных уязвимостей.
#
#   OWASP ZAP закрывает подпункт (б) на HTTP-уровне: отправляет
#   атакующие payload'ы по классам уязвимостей API (SQLi, XSS,
#   broken authentication, OWASP API Top-10) и фиксирует ответы
#   сервиса как индикаторы уязвимости. Это частичное покрытие
#   подпункта (б): анализ сетевых пакетов на L3/L4 (TCP/IP)
#   не выполняется, что является ограничением прототипа.
#   Подпункт (г) реализуется парным инструментом Grype
#   (см. grype-scope.yaml). Подпункты (а) и (в) выходят за рамки
#   прототипа.
# ====================================================================
zap:
  # ── Метаданные движка ─────────────────────────────────────────────
  engine:
    source: "ghcr.io/zaproxy/zaproxy:stable"
    scan_tool: "zap-api-scan.py"
    rationale: >-
      OWASP ZAP — открытый сканер веб-приложений, поддерживаемый
      OWASP Foundation. Образ ghcr.io/zaproxy/zaproxy:stable
      содержит ZAP core engine плюс утилиту zap-api-scan.py для
      сканирования API по OpenAPI/Swagger-спецификации. Версия
      движка фиксируется в каждом прогоне в артефакте
      zap-engine-version.txt для воспроизводимости (п. 4.3
      Методики).
    api_scan_mode: "openapi"
    api_scan_rationale: >-
      Режим openapi означает, что ZAP получает список endpoint'ов
      и их параметров из OpenAPI-спецификации сервиса. Это
      обеспечивает покрытие всех декларированных API-методов
      без необходимости explorative crawling. Подход применим
      для сервисов с публично доступной OpenAPI-спецификацией,
      каковым является MLServer (endpoint /v2/docs/dataplane.json).

  # ── Объект сканирования ──────────────────────────────────────────
  target:
    name: "deployed_service_api"
    description: >-
      HTTP API развёрнутого в тестовом Kubernetes-кластере сервиса
      MLServer. Доступ к сервису осуществляется через kubectl
      port-forward на localhost:8080. OpenAPI-спецификация
      запрашивается по фиксированному пути /v2/docs/dataplane.json.
    endpoint: "http://localhost:8080"
    openapi_path: "/v2/docs/dataplane.json"
    health_path: "/v2/health/ready"
    coverage_notes: >-
      Объект сканирования — runtime endpoint, развёрнутый из образа,
      собранного в build_image. Это финальный артефакт пайплайна,
      отражающий реальное поведение сервиса в среде функционирования.
      Сканирование выполняется после успешного deploy и проверки
      health-endpoint. Ограничение: проверяется только data plane
      API; control plane (admin, metrics) не входит в OpenAPI
      и не сканируется ZAP.

  # ── Параметры запуска сканера ─────────────────────────────────────
  scan_options:
    flags:
      - "-d"   # debug output для отчёта по п. 4.3
    output_formats:
      - "html"  # для оператора (zap-report.html)
      - "json"  # для машинного парсинга (zap-report.json)
    rationale: >-
      Опция -d включает debug output, что увеличивает объём
      stdout-лога, но даёт оператору полную видимость хода
      сканирования для отчёта по п. 4.3 Методики. JSON-формат
      необходим для машинного извлечения счётчиков alerts
      по risk-level в normalize_reports; HTML-формат прилагается
      для удобства экспертной оценки на Т006.
    timeout_notes: >-
      Job не использует явный таймаут на zap-api-scan.py.
      В прототипе максимальное время сканирования ограничивается
      GitLab CI job timeout. В production требуется явное
      ограничение через -T <minutes> для предотвращения
      зависания пайплайна.

  # ── Маппинг ZAP riskcode → risk-level ─────────────────────────────
  # ZAP API возвращает alerts с числовым riskcode 0..3.
  # Соответствие фиксированное (не переопределяется политикой).
  risk_levels:
    "3": "High"          # высокий риск
    "2": "Medium"        # средний риск
    "1": "Low"           # низкий риск
    "0": "Informational" # информационный (не блокирующий)

  # ── Маппинг ZAP confidence → confidence-level ─────────────────────
  # ZAP API возвращает confidence 0..4 (False Positive, Low, Medium,
  # High, Confirmed). Порог high_confidence — confidence >= 3.
  confidence_levels:
    high_threshold: 3
    rationale_threshold: >-
      Порог 3 (High) включает confidence "High" и "Confirmed".
      Это означает, что ZAP уверен в обнаружении и риск
      ложноположительного срабатывания мал. Совпадения с
      confidence "Medium" (2) и ниже могут быть ложноположительными
      и требуют экспертной верификации, что отражено
      в маппинге HIGH_RISK_HIGH_CONF (с порогом) и HIGH_RISK_TOTAL
      (без порога).

  # ── Нормализация результатов (Уровень 1, таблица Г.1) ────────────
  # Сырые признаки, эмитируемые job-ой zap_scan:
  #   ZAP_DEPLOY_OK               — был ли успешный deploy
  #   ZAP_ENDPOINT_READY          — отвечает ли /v2/health/ready
  #   ZAP_OPENAPI_FETCHED         — удалось ли скачать OpenAPI
  #   ZAP_EXIT_CODE               — exit code zap-api-scan.py
  #   ZAP_JSON_PARSE_ERROR        — валиден ли JSON-отчёт
  #   ZAP_SCAN_ERROR              — сводный флаг технической ошибки
  #
  #   ZAP_HIGH_RISK_TOTAL         — alerts с riskcode=3 (High)
  #   ZAP_HIGH_RISK_HIGH_CONF     — из них с confidence>=3 (High/Confirmed)
  #   ZAP_MEDIUM_RISK_TOTAL       — alerts с riskcode=2 (Medium)
  #   ZAP_MEDIUM_RISK_HIGH_CONF   — из них с confidence>=3
  #   ZAP_LOW_RISK_TOTAL          — alerts с riskcode=1 (Low)
  #   ZAP_INFO_RISK_TOTAL         — alerts с riskcode=0 (Info)
  #   ZAP_TOTAL_ALERTS            — суммарное число alerts
  #
  # Правила применяются в порядке приоритета.
  normalization:
    # 1. Отсутствие успешного deploy → недостаток данных
    - status: "MISSING"
      when:
        any:
          - "ZAP_DEPLOY_OK == false"
      rationale: >-
        deploy_to_test_k8s не сообщил об успешном развёртывании.
        Без работающего сервиса ZAP физически не может выполнить
        сканирование. Согласно примечанию к таблице Г.1 диплома,
        фиксируется как ⊥ (MISSING) и переводит автомат EFSM в q₇
        через δ1.1. Этот случай отделён от других технических
        проблем (правило 2), чтобы оператор ИС видел в отчёте,
        что причина MISSING — именно в развёртывании сервиса,
        а не в работе сканера.

    # 2. Endpoint недоступен или OpenAPI отсутствует → MISSING
    - status: "MISSING"
      when:
        any:
          - "ZAP_ENDPOINT_READY == false"
          - "ZAP_OPENAPI_FETCHED == false"
      rationale: >-
        deploy_to_test_k8s формально завершился успешно, но
        endpoint /v2/health/ready не отвечает (pod упал после
        deploy, port-forward не установился), либо OpenAPI-
        спецификация недоступна (сервис её не публикует или
        возвращает невалидный JSON). В обоих случаях ZAP не может
        выполнить scope сканирования. Статус — ⊥ (MISSING).

    # 3. Техническая ошибка сканирования или парсинга → MISSING
    - status: "MISSING"
      when:
        any:
          - "ZAP_SCAN_ERROR == true"
          - "ZAP_EXIT_CODE >= 3"
          - "ZAP_JSON_PARSE_ERROR == true"
      rationale: >-
        Сводный флаг ZAP_SCAN_ERROR=true, exit code >= 3 (внутренняя
        ошибка zap-api-scan.py, сетевые проблемы) или невалидный
        JSON-отчёт. Во всех этих случаях валидный отчёт инструмента
        отсутствует, статус — ⊥. Exit code 0/1/2 у ZAP API Scan —
        это штатные результаты (passed / WARN / FAIL по внутреннему
        порогу ZAP), они не считаются техническими ошибками
        и обрабатываются последующими правилами на основе
        счётчиков alerts.

    # 4. High risk с высокой уверенностью → FAIL
    - status: "FAIL"
      when:
        all:
          - "ZAP_HIGH_RISK_HIGH_CONF > 0"
      rationale: >-
        Обнаружен alert с High risk-level (riskcode=3) и confidence
        High/Confirmed (>=3). Сочетание этих признаков означает
        достоверное обнаружение уязвимости высокой опасности
        (например, SQL injection, authentication bypass) с минимальным
        риском ложного срабатывания. Соответствует выставлению
        FAIL на уровне инструмента согласно таблице Г.1 диплома.
        Это правило аналогично квалификации HIGH/HIGH в Bandit:
        совпадение двух параметров (severity и confidence) даёт
        автоматическую квалификацию без экспертной верификации
        на Уровне 1.

    # 5. High risk с пониженной уверенностью → REVIEW
    - status: "REVIEW"
      when:
        all:
          - "ZAP_HIGH_RISK_TOTAL > 0"
          - "ZAP_HIGH_RISK_HIGH_CONF == 0"
      rationale: >-
        High risk-alert обнаружен, но с confidence ниже High.
        Это значит, что ZAP не уверен в обнаружении: возможны
        ложноположительные срабатывания на специфике API MLServer
        (например, эвристики SQL injection ложно срабатывают
        на base64-encoded payload'ах модели). Требуется экспертная
        верификация на Т006. Согласно таблице Г.1 диплома,
        статус — REVIEW.

    # 6. Medium risk с высокой уверенностью → REVIEW
    - status: "REVIEW"
      when:
        all:
          - "ZAP_MEDIUM_RISK_HIGH_CONF > 0"
          - "ZAP_HIGH_RISK_TOTAL == 0"
      rationale: >-
        Medium risk-alert с высокой уверенностью — конкретно
        обнаруженная уязвимость средней опасности (например,
        information disclosure через error messages, missing
        security headers с подтверждением через response).
        На Уровне 1 не достигает FAIL, но требует экспертной
        верификации.

    # 7. Иначе — чистый прогон
    - status: "PASS"
      when:
        all:
          - "ZAP_SCAN_ERROR == false"
          - "ZAP_HIGH_RISK_TOTAL == 0"
          - "ZAP_MEDIUM_RISK_HIGH_CONF == 0"
      rationale: >-
        Сканирование штатно завершилось, отсутствуют High risk
        alerts и Medium risk alerts с высокой уверенностью.
        Срабатывания Medium risk с пониженной уверенностью, Low
        risk и Informational не учитываются на Уровне 1 в
        соответствии с принципом консервативной квалификации
        (таблица Г.1 диплома); они сохраняются в полном
        zap-report.json и доступны для экспертного анализа (Т006),
        но не блокируют автоматическое принятие решения.

# ====================================================================
# Замечание о специфике API MLServer
#
# MLServer как сервис ML-инференса обладает рядом особенностей,
# которые могут влиять на интерпретацию результатов ZAP:
#
# 1. Большие payload'ы (тензоры numpy) могут провоцировать
#    эвристики ZAP на ложные срабатывания SQLi/XSS из-за
#    последовательностей символов в base64-encoded данных.
#    Это покрывается через различение HIGH_RISK_HIGH_CONF
#    и HIGH_RISK_TOTAL: высокоуверенные обнаружения с большей
#    вероятностью истинны.
#
# 2. API MLServer не использует пользовательскую аутентификацию
#    в тестовой среде (только сетевую изоляцию через k8s).
#    Это означает, что часть OWASP API Top-10 категорий
#    (например, broken authentication) формально не применимы.
#    ZAP всё равно будет их проверять; ложные срабатывания
#    отсеиваются Уровнем 2 при агрегации с Schemathesis.
#
# 3. OpenAPI-спецификация /v2/docs/dataplane.json генерируется
#    автоматически из аннотаций FastAPI. Расхождения между
#    декларацией и фактическим поведением — задача Schemathesis,
#    не ZAP.
# ====================================================================

# ====================================================================
# Расширение политики
#
# Изменение источника engine, параметров scan_options, маппингов
# risk_levels / confidence_levels или правил normalization допустимо
# только через изменение этого файла. Изменения, не отражённые
# в файле, считаются нарушением политики сканирования. Файл
# прилагается к артефактам каждого прогона пайплайна
# для воспроизводимости и аудита (п. 4.3 Методики).
# ====================================================================
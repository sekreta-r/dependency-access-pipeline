# ====================================================================
# Политика сигнатурного поиска известных уязвимостей средствами Grype
# для пайплайна тестирования обновлений безопасности по Методике
# ФСТЭК 2022 г.
# ====================================================================
#
# Назначение
#   Зафиксировать состав, границы и правила нормализации результатов
#   сигнатурного поиска известных уязвимостей в обновлениях безопасности
#   средством Grype в рамках теста Т005 (мониторинг активности
#   обновлений безопасности в среде тестирования, п. 3.6 Методики).
#
#   Политика регламентирует Уровень 1 формальной модели — переход
#   от сырых признаков, эмитируемых job-ами grype_sbom и grype_image,
#   к статусам инструмента в множестве {PASS, REVIEW, FAIL, MISSING}
#   (см. таблица Г.1 диплома). В Уровне 1 эти два прогона
#   рассматриваются как отдельные источники с независимой
#   нормализацией; их агрегация с парными инструментами теста Т005
#   (ZAP, Schemathesis) и определение цвета теста выполняются
#   на Уровне 2 по отдельной политике, не входящей в настоящий файл.
#
# Контекст по Методике
#   Согласно п. 3.6.3 Методики, мониторинг активности обновлений
#   безопасности предусматривает четыре подпункта:
#     а) анализ системных вызовов;
#     б) анализ сетевых пакетов;
#     в) анализ состава файловой системы до и после установки;
#     г) сигнатурный поиск известных уязвимостей.
#
#   Grype закрывает только подпункт (г) — сигнатурный поиск известных
#   уязвимостей по базам CVE и каталогу CISA KEV. Подпункты (а), (б),
#   (в) реализуются другими средствами теста Т005 (ZAP — частичное
#   покрытие (б) на HTTP-уровне; Schemathesis — контрактный fuzzing
#   API) и не регламентируются настоящей политикой.
#
# Архитектура двойного прогона
#   Grype запускается двумя независимыми job-ами на разных стадиях
#   пайплайна:
#     1. grype_sbom  — стадия security, после bandit_and_sbom.
#                       Объект: CycloneDX SBOM Python-проекта.
#                       Покрытие: дерево Python-зависимостей.
#                       Цель: ранний сигнал на pre-build стадии.
#     2. grype_image — стадия image_security, после build_image.
#                       Объект: контейнерный образ из internal registry.
#                       Покрытие: Python-зависимости + системные пакеты
#                       базового образа + бинарные слои.
#                       Цель: полное покрытие, недостижимое через SBOM.
#
#   Парный прогон обоснован принципом полноты покрытия Т005 (§2.4
#   диплома). Эмпирическая иллюстрация: SBOM-прогон может не выявить
#   уязвимостей при наличии Critical-CVE в системных пакетах базового
#   образа (debian:trixie в python:3.11-slim), которые видны только
#   image-прогону.
# ====================================================================

# ====================================================================
# Общие метаданные движка (применимо к обоим прогонам)
# ====================================================================
grype:
  engine:
    source: "github:anchore/grype"
    install_method: "curl install.sh -b /usr/local/bin"
    db_source: "https://grype.anchore.io/databases"
    kev_source: "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json"
    rationale: >-
      Grype — open-source SCA-сканер от Anchore, выполняющий
      сопоставление SBOM или контейнерных образов с базой
      vulnerability-db. База обновляется каждый прогон через
      grype db update. Каталог CISA KEV (Known Exploited
      Vulnerabilities) скачивается независимо от Grype для
      обеспечения точного контроля разметки в признаках
      GRYPE_*_KEV_MATCHES, требуемых переходом δ3.1 автомата
      EFSM (диплом, §2.5). Версии движка, БД и количество CVE
      в KEV-каталоге фиксируются в артефактах *-engine-version.txt
      для воспроизводимости (п. 4.3 Методики). Для экономии
      сетевых запросов grype_image переиспользует CISA KEV
      каталог, переданный через needs.artifacts из grype_sbom;
      при недоступности — производит независимое скачивание.

# ====================================================================
# Прогон 1: grype_sbom — анализ CycloneDX SBOM Python-проекта
# ====================================================================
  sbom:
    description: >-
      Анализ CycloneDX SBOM, сгенерированного утилитой cyclonedx-py
      poetry в job bandit_and_sbom. Прогон выполняется на стадии
      security и даёт ранний сигнал об уязвимых Python-зависимостях
      до сборки контейнерного образа.
    target:
      name: "sbom"
      source_artifact: "artifacts/sbom.json"
      source_job: "bandit_and_sbom"
      coverage_notes: >-
        SBOM покрывает дерево Python-зависимостей. Уязвимости
        в системных пакетах базового образа, в произвольных бинарных
        blobs внутри wheel-архивов и во встроенных конфигурационных
        файлах не покрываются; их анализ выполняется парным прогоном
        grype_image.
    scan_options:
      output_format: "json"
      rationale: >-
        JSON-вывод необходим для машинного парсинга счётчиков
        по severity и для построения пересечения с CISA KEV
        каталогом. Альтернативные форматы (table, sarif, cyclonedx)
        используются только как дополнительный артефакт.

    # ── Нормализация прогона grype_sbom (Уровень 1, таблица Г.1) ────
    # Сырые признаки, эмитируемые job-ой grype_sbom:
    #   GRYPE_SBOM_SBOM_FOUND           — был ли найден входной SBOM
    #   GRYPE_SBOM_DB_UPDATE_EXIT       — exit code grype db update
    #   GRYPE_SBOM_KEV_FETCH_OK         — успешно ли получен CISA KEV
    #   GRYPE_SBOM_EXIT_CODE            — exit code grype scan
    #   GRYPE_SBOM_JSON_PARSE_ERROR     — валиден ли JSON-отчёт
    #   GRYPE_SBOM_SCAN_ERROR           — сводный флаг технической ошибки
    #
    #   GRYPE_SBOM_CRITICAL_TOTAL       — число CVE с severity Critical
    #   GRYPE_SBOM_CRITICAL_FIXED       — из них имеющих исправление
    #   GRYPE_SBOM_CRITICAL_UNFIXED     — из них без исправления
    #   GRYPE_SBOM_HIGH_TOTAL           — число CVE с severity High
    #   GRYPE_SBOM_HIGH_FIXED           — из них имеющих исправление
    #   GRYPE_SBOM_HIGH_UNFIXED         — из них без исправления
    #   GRYPE_SBOM_MEDIUM_TOTAL         — число CVE с severity Medium
    #   GRYPE_SBOM_LOW_TOTAL            — число CVE с severity Low
    #   GRYPE_SBOM_NEGLIGIBLE_TOTAL     — число CVE с severity Negligible
    #   GRYPE_SBOM_TOTAL_MATCHES        — суммарное число совпадений
    #
    #   GRYPE_SBOM_KEV_MATCHES          — число CVE из отчёта,
    #                                      присутствующих в CISA KEV
    #                                      (критично для δ3.1)
    #
    # Правила применяются в порядке приоритета.
    normalization:
      # 1. Отсутствие входного SBOM → недостаток данных
      - status: "MISSING"
        when:
          any:
            - "GRYPE_SBOM_SBOM_FOUND == false"
        rationale: >-
          SBOM от bandit_and_sbom не сформирован или не передан
          через needs.artifacts. Инструмент не может вынести
          заключение. Согласно примечанию к таблице Г.1 диплома,
          фиксируется как ⊥ (MISSING) и переводит автомат EFSM
          в q₇ через δ1.1.

      # 2. Техническая ошибка обновления БД, скана или парсинга → MISSING
      - status: "MISSING"
        when:
          any:
            - "GRYPE_SBOM_SCAN_ERROR == true"
        rationale: >-
          Сводный флаг GRYPE_SBOM_SCAN_ERROR=true фиксирует одну
          из технических проблем: обновление БД уязвимостей не удалось
          (rate-limit, недоступность grype.anchore.io), grype scan
          завершился с exit > 1 (внутренняя ошибка), либо JSON-отчёт
          повреждён. Во всех этих случаях валидный отчёт инструмента
          отсутствует, статус — ⊥. Случай GRYPE_SBOM_KEV_FETCH_OK=false
          НЕ приводит к MISSING сам по себе: при недоступности CISA KEV
          каталога инструмент работает с GRYPE_SBOM_KEV_MATCHES=0,
          что означает консервативное предположение об отсутствии
          известных эксплуатируемых уязвимостей и фиксируется в отчёте
          по п. 4.3 Методики как ограничение прогона.

      # 3. KEV-эксплуатируемая уязвимость → FAIL
      - status: "FAIL"
        when:
          all:
            - "GRYPE_SBOM_KEV_MATCHES > 0"
        rationale: >-
          Обнаружена уязвимость, входящая в каталог CISA Known
          Exploited Vulnerabilities — то есть уязвимость, для которой
          подтверждено активное использование злоумышленниками
          в дикой природе. KEV-совпадение является достоверным
          признаком высокой опасности вне зависимости от severity,
          заявленной в базе vulnerability-db Grype. Правило
          соответствует переходу δ3.1 автомата EFSM (диплом, §2.5):
          KEV-эксплуатация переводит автомат напрямую в q₁₀ REJECT
          через q₃→q₆.

      # 4. Critical CVE без доступного исправления → FAIL
      - status: "FAIL"
        when:
          all:
            - "GRYPE_SBOM_CRITICAL_UNFIXED > 0"
        rationale: >-
          Критическая уязвимость без выпущенного исправления — это
          ситуация, в которой обновление безопасности заведомо
          оставляет известный вектор атаки эксплуатируемым. Согласно
          принципу консервативности прототипа КИИ, такое обновление
          не может быть автоматически допущено. Замечание:
          критическая уязвимость С доступным исправлением
          (CRITICAL_FIXED > 0, CRITICAL_UNFIXED == 0) НЕ даёт FAIL,
          поскольку означает, что Grype нашёл уязвимость в текущей
          версии зависимости, но исправление существует и может
          быть применено выпуском следующего обновления.

      # 5. Уязвимости высокой опасности → REVIEW
      - status: "REVIEW"
        when:
          any:
            - "GRYPE_SBOM_HIGH_TOTAL > 0"
            - "GRYPE_SBOM_CRITICAL_FIXED > 0"
        rationale: >-
          High severity уязвимости и Critical уязвимости с доступным
          исправлением требуют экспертной верификации (Т006).
          На Уровне 1 автоматическая квалификация ограничена статусом
          REVIEW; финальное решение принимается на Уровне 2 при
          агрегации с ZAP и Schemathesis, либо передаётся на Т006
          при наличии других REVIEW-сигналов.

      # 6. Иначе — чистый прогон
      - status: "PASS"
        when:
          all:
            - "GRYPE_SBOM_SCAN_ERROR == false"
            - "GRYPE_SBOM_KEV_MATCHES == 0"
            - "GRYPE_SBOM_CRITICAL_TOTAL == 0"
            - "GRYPE_SBOM_HIGH_TOTAL == 0"
        rationale: >-
          Сканирование штатно завершилось, отсутствуют
          KEV-совпадения, нет уязвимостей Critical или High severity.
          Уязвимости Medium/Low/Negligible severity не учитываются
          на Уровне 1 в соответствии с таблицей Г.1 диплома; они
          сохраняются в полном grype-sbom-report.json и доступны
          для экспертного анализа (Т006), но не блокируют
          автоматическое принятие решения.

# ====================================================================
# Прогон 2: grype_image — анализ контейнерного образа
# ====================================================================
  image:
    description: >-
      Анализ собранного контейнерного образа, опубликованного
      в internal Docker registry. Прогон выполняется на стадии
      image_security между build и deploy. Цель — выявить
      уязвимости, лежащие вне SBOM Python-проекта: в системных
      пакетах базового образа (debian:trixie), в бинарных слоях
      и в зависимостях, добавляемых на этапе сборки.
    target:
      name: "image"
      source_dotenv_var: "BUILT_IMAGE"
      source_job: "build_image"
      registry_scheme: "registry:"
      coverage_notes: >-
        Image-прогон покрывает полный состав контейнерного образа,
        включая системные пакеты apt, добавленные слои docker build
        и Python-зависимости. На уровне базового образа Grype
        использует package manifest (dpkg, apk) для составления
        перечня пакетов; уязвимости в файлах вне package manager
        (например, в /usr/local/bin бинарях, установленных через
        curl) Grype не покрывает — для этого предусмотрено
        YARA-сканирование (Т004).

    scan_options:
      output_format: "json"
      registry_auth_method: "~/.docker/config.json"
      rationale: >-
        Схема registry: позволяет Grype выполнять pull образа
        непосредственно через registry API без локального Docker
        daemon (dind). Авторизация в internal registry выполняется
        через стандартный ~/.docker/config.json, формируемый
        в начале job из CI/CD-переменных CI_REGISTRY_USER
        и CI_REGISTRY_PASSWORD. После прогона файл credentials
        удаляется (best-effort cleanup).

    # ── Нормализация прогона grype_image (Уровень 1, таблица Г.1) ────
    # Сырые признаки, эмитируемые job-ой grype_image:
    #   GRYPE_IMAGE_IMAGE_FOUND         — установлено ли BUILT_IMAGE
    #                                      из dotenv build_image
    #   GRYPE_IMAGE_DB_UPDATE_EXIT      — exit code grype db update
    #   GRYPE_IMAGE_KEV_FETCH_OK        — успешно ли получен CISA KEV
    #   GRYPE_IMAGE_KEV_REUSED          — был ли KEV-каталог
    #                                      переиспользован из grype_sbom
    #   GRYPE_IMAGE_EXIT_CODE           — exit code grype scan
    #   GRYPE_IMAGE_JSON_PARSE_ERROR    — валиден ли JSON-отчёт
    #   GRYPE_IMAGE_SCAN_ERROR          — сводный флаг технической ошибки
    #
    #   GRYPE_IMAGE_CRITICAL_TOTAL      — число CVE с severity Critical
    #   GRYPE_IMAGE_CRITICAL_FIXED      — из них имеющих исправление
    #   GRYPE_IMAGE_CRITICAL_UNFIXED    — из них без исправления
    #   GRYPE_IMAGE_HIGH_TOTAL          — число CVE с severity High
    #   GRYPE_IMAGE_HIGH_FIXED          — из них имеющих исправление
    #   GRYPE_IMAGE_HIGH_UNFIXED        — из них без исправления
    #   GRYPE_IMAGE_MEDIUM_TOTAL        — число CVE с severity Medium
    #   GRYPE_IMAGE_LOW_TOTAL           — число CVE с severity Low
    #   GRYPE_IMAGE_NEGLIGIBLE_TOTAL    — число CVE severity Negligible
    #   GRYPE_IMAGE_TOTAL_MATCHES       — суммарное число совпадений
    #
    #   GRYPE_IMAGE_KEV_MATCHES         — число CVE из отчёта,
    #                                      присутствующих в CISA KEV
    #                                      (критично для δ3.1)
    #
    # Структура правил параллельна нормализации sbom: те же шесть
    # правил с теми же приоритетами, отличается только префикс
    # переменных. Это обеспечивает консистентность нормализации
    # обоих прогонов на Уровне 1 и переносит ответственность
    # за обработку расхождений между sbom и image на Уровень 2.
    normalization:
      # 1. Отсутствие имени образа → недостаток данных
      - status: "MISSING"
        when:
          any:
            - "GRYPE_IMAGE_IMAGE_FOUND == false"
        rationale: >-
          Переменная BUILT_IMAGE не установлена в dotenv-артефакте
          build_image — это означает, что build_image не сформировал
          валидную идентификацию образа, либо его dotenv не был
          передан через needs.artifacts. Без имени образа Grype
          не может выполнить сканирование. Согласно примечанию
          к таблице Г.1 диплома, фиксируется как ⊥ (MISSING)
          и переводит автомат EFSM в q₇ через δ1.1.

      # 2. Техническая ошибка обновления БД, скана или парсинга → MISSING
      - status: "MISSING"
        when:
          any:
            - "GRYPE_IMAGE_SCAN_ERROR == true"
        rationale: >-
          Сводный флаг GRYPE_IMAGE_SCAN_ERROR=true фиксирует одну
          из технических проблем: обновление БД уязвимостей не удалось,
          grype scan завершился с exit > 1, либо JSON-отчёт повреждён.
          Дополнительные источники технических ошибок, специфичные
          для image-прогона: недоступность internal registry, отказ
          в авторизации, отсутствие образа в registry — все они
          приводят к exit > 1 у grype scan и попадают под условие
          GRYPE_IMAGE_EXIT_CODE > 1 в SCAN_ERROR. Случай
          GRYPE_IMAGE_KEV_FETCH_OK=false НЕ приводит к MISSING:
          при недоступности CISA KEV каталога инструмент работает
          с GRYPE_IMAGE_KEV_MATCHES=0 как консервативное
          предположение.

      # 3. KEV-эксплуатируемая уязвимость → FAIL
      - status: "FAIL"
        when:
          all:
            - "GRYPE_IMAGE_KEV_MATCHES > 0"
        rationale: >-
          Обнаружена уязвимость, входящая в каталог CISA Known
          Exploited Vulnerabilities. Семантика правила и обоснование
          идентичны соответствующему правилу прогона sbom (см. выше).
          На уровне образа KEV-совпадения могут происходить как
          в Python-зависимостях, так и в системных пакетах базового
          образа, что обеспечивает более широкое покрытие.

      # 4. Critical CVE без доступного исправления → FAIL
      - status: "FAIL"
        when:
          all:
            - "GRYPE_IMAGE_CRITICAL_UNFIXED > 0"
        rationale: >-
          Критическая уязвимость без выпущенного исправления.
          Семантика правила и обоснование идентичны соответствующему
          правилу прогона sbom. На уровне образа CRITICAL_UNFIXED
          может включать уязвимости в системных пакетах базового
          образа, для которых исправление недоступно в текущем
          релизе дистрибутива и ожидается с следующим релизом —
          такая ситуация требует либо обновления базового образа,
          либо принятия риска на уровне оператора ИС с фиксацией
          через Т006.

      # 5. Уязвимости высокой опасности → REVIEW
      - status: "REVIEW"
        when:
          any:
            - "GRYPE_IMAGE_HIGH_TOTAL > 0"
            - "GRYPE_IMAGE_CRITICAL_FIXED > 0"
        rationale: >-
          High severity уязвимости и Critical уязвимости с доступным
          исправлением. Семантика правила и обоснование идентичны
          соответствующему правилу прогона sbom.

      # 6. Иначе — чистый прогон
      - status: "PASS"
        when:
          all:
            - "GRYPE_IMAGE_SCAN_ERROR == false"
            - "GRYPE_IMAGE_KEV_MATCHES == 0"
            - "GRYPE_IMAGE_CRITICAL_TOTAL == 0"
            - "GRYPE_IMAGE_HIGH_TOTAL == 0"
        rationale: >-
          Сканирование штатно завершилось, отсутствуют
          KEV-совпадения, нет уязвимостей Critical или High severity
          ни в Python-зависимостях, ни в системных пакетах базового
          образа. Уязвимости Medium/Low/Negligible severity
          не учитываются на Уровне 1.

# ====================================================================
# Замечание о двойном прогоне на Уровне 2
#
# На Уровне 1 grype_sbom и grype_image нормализуются независимо
# и могут давать различные статусы. Это штатная ситуация:
# например, статус PASS для sbom при FAIL для image означает,
# что Python-зависимости чистые, но в системных пакетах базового
# образа выявлены критические уязвимости без исправления.
#
# Обработка расхождений между статусами sbom и image — задача
# Уровня 2 (агрегация в цвет теста Т005). Возможные стратегии
# агрегации (выбор оформляется в level2-aggregation policy):
#   - правило вето (худший из двух статусов определяет агрегат) —
#     соответствует п. 4.6 Методики о "худшем результате";
#   - правило по объекту (image имеет приоритет, так как
#     отражает финальный артефакт развёртывания) — соответствует
#     консервативной стратегии прототипа КИИ.
